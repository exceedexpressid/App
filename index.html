                                <div className="p-5 overflow-y-auto flex-1 bg-gray-50">
                                    <div className="bg-white p-3 rounded-xl border border-gray-200 shadow-sm mb-5 text-center">
                                        <p className="text-[9px] text-gray-400 font-bold uppercase tracking-widest mb-1">No. Resi</p>
                                        <p className="text-lg font-mono font-black text-orange-600">{selectedPkg.packageId}</p>
                                    </div>
                                    <form onSubmit={handleUpdateStatus} className="space-y-4">
                                        <div>
                                            <label className="block text-[11px] font-bold text-gray-700 mb-1.5 uppercase tracking-widest">Status Final</label>
                                            <select name="status" value={updateStatusVal} onChange={(e) => setUpdateStatusVal(e.target.value)} className="w-full p-3 bg-white border border-gray-300 rounded-xl text-xs font-bold outline-none focus:border-orange-500 shadow-sm appearance-none">
                                                <option value="SUKSES">✅ SUKSES (Terkirim)</option>
                                                <option value="PENDING">⏱️ PENDING (Tunda)</option>
                                                <option value="CANCEL">❌ CANCEL (Batal)</option>
                                                <option value="SIAP_ANTAR">🚚 PROSES (Siap Antar)</option>
                                            </select>
                                        </div>
                                        
                                        {updateStatusVal === 'SUKSES' && (
                                            <div className="animate-fade-in bg-emerald-50 p-4 rounded-xl border border-emerald-200 shadow-sm">
                                                <label className="block text-[11px] font-bold text-emerald-800 mb-1.5 uppercase tracking-widest">Metode Bayar (Wajib)</label>
                                                <select name="metodeBayarUpdate" defaultValue={selectedPkg.metodeBayar} className="w-full p-3 bg-white border border-emerald-300 text-emerald-900 rounded-lg text-xs font-bold outline-none focus:border-emerald-600 appearance-none">
                                                    <option value="CASH">CASH (TUNAI)</option>
                                                    <option value="TF KANTOR">TF KANTOR</option>
                                                    <option value="TF OLSHOP">TF OLSHOP</option>
                                                </select>
                                            </div>
                                        )}

                                        {(updateStatusVal === 'PENDING' || updateStatusVal === 'CANCEL') && (
                                            <div className="animate-fade-in bg-red-50 p-4 rounded-xl border border-red-200 shadow-sm">
                                                <label className="block text-[11px] font-bold text-red-800 mb-1.5 uppercase tracking-widest">Keterangan / Alasan</label>
                                                <input type="text" name="keterangan" required placeholder="Wajib isi alasan detail..." className="w-full p-3 bg-white border border-red-300 rounded-xl text-xs font-semibold outline-none focus:border-red-500" />
                                            </div>
                                        )}
                                        
                                        <button type="submit" disabled={isLoading} className="w-full bg-slate-900 text-white font-black py-3.5 rounded-xl shadow-lg active:scale-95 text-xs uppercase tracking-widest mt-2 transition-transform">
                                            {isLoading ? <i className="fas fa-spinner fa-spin"></i> : 'Simpan Perubahan'}
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL KAMERA FULL SCREEN APPSHEET STYLE */}
                    {isCameraFullScreen && (
                        <div className="fixed inset-0 z-[9999] bg-black flex flex-col animate-fade-in">
                            <div className="absolute top-0 w-full p-4 flex justify-between items-center z-10 bg-gradient-to-b from-black/80 to-transparent">
                                <span className="text-white font-bold text-sm drop-shadow-md tracking-wider">Ambil Foto Bukti</span>
                                <button type="button" onClick={stopCamera} className="text-white w-8 h-8 flex items-center justify-center bg-black/40 rounded-full border border-white/20 active:bg-white/20">
                                    <i className="fas fa-times"></i>
                                </button>
                            </div>
                            
                            <div className="flex-1 relative bg-black flex items-center justify-center">
                                <video ref={videoRef} autoPlay playsInline muted className="absolute inset-0 w-full h-full object-cover"></video>
                                <div className="absolute inset-0 border-[1.5px] border-white/30 pointer-events-none grid grid-cols-3 grid-rows-3">
                                    <div className="border-r border-b border-white/30"></div><div className="border-b border-white/30"></div><div className="border-l border-b border-white/30"></div>
                                    <div className="border-r border-b border-white/30"></div><div className="border-b border-white/30"></div><div className="border-l border-b border-white/30"></div>
                                    <div className="border-r border-white/30"></div><div></div><div className="border-l border-white/30"></div>
                                </div>
                            </div>
                            
                            <div className="h-32 bg-black flex items-center justify-center w-full z-10 pb-4 shrink-0 border-t border-white/10">
                                <button type="button" onClick={takePhoto} className="w-16 h-16 bg-white rounded-full flex items-center justify-center border-4 border-gray-400 active:scale-90 transition-transform">
                                    <div className="w-14 h-14 rounded-full border-[3px] border-black"></div>
                                </button>
                            </div>
                            <canvas ref={canvasRef} style={{ display: 'none' }}></canvas>
                        </div>
                    )}

                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
