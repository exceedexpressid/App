                                                className="w-full pl-9 pr-3 py-3 bg-slate-900 border border-slate-700 rounded-xl text-sm text-white font-bold outline-none focus:border-blue-500 transition-colors relative z-50"
                                                placeholder="Ketik/Pilih Olshop..."
                                            />
                                        </div>
                                        {showOlshopDropdown && (
                                            <React.Fragment>
                                                <div className="fixed inset-0 z-40" onClick={() => setShowOlshopDropdown(false)}></div>
                                                <ul className="absolute z-50 w-full mt-2 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl max-h-48 overflow-y-auto custom-scrollbar">
                                                    {masterOlshops.filter(o => o.nama.toLowerCase().includes(inputOlshopSearch.toLowerCase())).map((o, i) => (
                                                        <li key={i} onClick={() => { setInputOlshopSearch(o.nama); setShowOlshopDropdown(false); }} className="p-3.5 text-sm hover:bg-slate-700 cursor-pointer border-b border-slate-700/50 font-bold text-slate-200">{o.nama}</li>
                                                    ))}
                                                    {masterOlshops.filter(o => o.nama.toLowerCase().includes(inputOlshopSearch.toLowerCase())).length === 0 && (
                                                        <li className="p-3 text-xs text-slate-500 italic text-center">Toko tidak ditemukan</li>
                                                    )}
                                                </ul>
                                            </React.Fragment>
                                        )}
                                    </div>

                                    <div><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Nama Penerima*</label><input type="text" name="customerName" required className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white font-bold outline-none focus:border-blue-500 transition-colors" /></div>
                                    <div><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">No HP</label><input type="tel" name="customerPhone" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white font-bold outline-none focus:border-blue-500 transition-colors" /></div>
                                    <div><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Alamat Lengkap*</label><textarea name="address" required rows="2" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white font-bold outline-none focus:border-blue-500 transition-colors resize-none"></textarea></div>
                                    
                                    <div className="grid grid-cols-2 gap-3 relative z-0">
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Hrg Barang</label>
                                            <input type="text" inputMode="numeric" name="hargaPaket" value={valHarga} onChange={(e) => { let v = e.target.value.replace(/\D/g, ''); setValHarga(v === '' ? '' : idrFormatter.format(parseInt(v, 10))); }} className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white font-bold outline-none focus:border-blue-500 transition-colors" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Kode Zona (TRF)</label>
                                            <select name="ongkirKode" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-slate-200 font-bold truncate outline-none focus:border-blue-500 transition-colors appearance-none">
                                                <option value="" data-harga="0">Pilih Zona...</option>
                                                {masterZonas.map((z, i) => <option key={i} value={z.id} data-harga={z.harga}>{z.id} ({z.nama}) - Rp{formatCurr(z.harga)}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Tmbhn Ongkir Vol/Jarak</label>
                                        <input type="text" inputMode="numeric" name="tambahanOngkir" value={valTambahan} onChange={(e) => { let v = e.target.value.replace(/\D/g, ''); setValTambahan(v === '' ? '' : idrFormatter.format(parseInt(v, 10))); }} className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white font-bold outline-none focus:border-blue-500 transition-colors" />
                                    </div>

                                    <div className="border-t border-slate-700 pt-4 mt-4">
                                        <label className="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-1.5 ml-1">Status Pengantaran</label>
                                        <select value={inputFormStatus} onChange={(e) => setInputFormStatus(e.target.value)} className="w-full bg-slate-900 border border-emerald-500/50 text-emerald-400 rounded-xl p-3 text-sm font-black outline-none focus:border-emerald-400 transition-colors appearance-none">
                                            <option value="Siap Antar">PROSES (Siap Antar)</option>
                                            <option value="SUKSES">SUKSES</option>
                                            <option value="PENDING">PENDING</option>
                                            <option value="CANCEL">CANCEL</option>
                                        </select>
                                    </div>

                                    {inputFormStatus === 'SUKSES' && (
                                        <div className="animate-fade-in-down bg-emerald-900/20 border border-emerald-500/30 p-4 rounded-xl">
                                            <label className="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-1.5 ml-1">Metode Bayar (Wajib)</label>
                                            <select name="metodeBayar" required className="w-full bg-slate-900 border border-emerald-500/50 text-white rounded-xl p-3 text-sm font-bold outline-none appearance-none">
                                                <option value="CASH">CASH</option>
                                                <option value="TF OLSHOP">TF OLSHOP</option>
                                                <option value="TF KANTOR">TF KANTOR</option>
                                            </select>
                                        </div>
                                    )}

                                    {(inputFormStatus === 'PENDING' || inputFormStatus === 'CANCEL') && (
                                        <div className="animate-fade-in-down bg-orange-900/20 border border-orange-500/30 p-4 rounded-xl">
                                            <label className="text-[10px] font-bold text-orange-400 uppercase tracking-widest block mb-1.5 ml-1">Keterangan / Alasan</label>
                                            <input type="text" name="keteranganForm" required placeholder="Tulis alasan..." className="w-full bg-slate-900 border border-orange-500/50 rounded-xl p-3 text-sm text-white font-bold outline-none focus:border-orange-400" />
                                        </div>
                                    )}

                                    <div className="pt-2 relative z-0">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Foto Gambar Paket</label>
                                        <div className="bg-slate-900 border-2 border-dashed border-slate-600 rounded-xl overflow-hidden transition-colors hover:border-slate-500">
                                            {!capturedPhoto ? (
                                                <button type="button" onClick={startCamera} className="w-full py-8 text-slate-500 flex flex-col items-center">
                                                    <i className="fas fa-camera text-3xl mb-3 text-blue-500"></i>
                                                    <span className="text-[11px] font-bold uppercase tracking-widest text-slate-400">Buka Kamera HP</span>
                                                </button>
                                            ) : (
                                                <div className="relative">
                                                    <img src={capturedPhoto} className="w-full max-h-48 object-cover" />
                                                    <button type="button" onClick={retakePhoto} className="absolute top-2 right-2 bg-red-500 text-white px-3 py-1.5 rounded-lg shadow-lg text-[10px] font-bold flex items-center active:scale-90 transition-transform"><i className="fas fa-redo mr-1.5"></i> Ulang</button>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <button type="submit" disabled={isLoading} className="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-900/50 active:scale-95 transition-transform mt-6 text-sm uppercase tracking-widest border border-blue-500/50">Simpan Resi</button>
                                </form>
                            </div>
                        )}

                        {/* TAB HISTORI */}
                        {activeTab === 'histori' && (
                            <div className="animate-fade-in-down px-1">
                                <h2 className="font-black text-white text-lg mb-4 flex items-center"><i className="fas fa-history text-blue-500 mr-2"></i> Histori Tugas</h2>
                                <div className="mb-3 relative">
                                    <i className="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500 text-sm"></i>
                                    <input type="text" placeholder="Cari nama, resi, olshop, nomor HP..." value={searchHistori} onChange={e=>setSearchHistori(e.target.value)} className="w-full pl-10 pr-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-xs outline-none focus:border-blue-500 text-white placeholder-slate-500 transition-colors shadow-sm" />
                                </div>
                                <div className="bg-slate-800 p-3 rounded-xl shadow-sm border border-slate-700 mb-3 flex items-center gap-2">
                                    <div className="flex-1 relative">
                                        <i className="far fa-calendar-alt absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500 text-[10px]"></i>
                                        <input type="date" value={historiStartDate} onChange={e=>setHistoriStartDate(e.target.value)} className="w-full pl-8 pr-2 py-2 bg-slate-900 border border-slate-600 rounded-lg text-[10px] outline-none focus:border-blue-500 text-slate-300 font-bold" />
                                    </div>
                                    <span className="text-[10px] font-bold text-slate-500">s/d</span>
                                    <div className="flex-1 relative">
                                        <i className="far fa-calendar-alt absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500 text-[10px]"></i>
                                        <input type="date" value={historiEndDate} onChange={e=>setHistoriEndDate(e.target.value)} className="w-full pl-8 pr-2 py-2 bg-slate-900 border border-slate-600 rounded-lg text-[10px] outline-none focus:border-blue-500 text-slate-300 font-bold" />
                                    </div>
                                </div>
                                <div className="flex gap-2 mb-4 overflow-x-auto scrollbar-hide py-1">
                                    <button onClick={() => setHistoriStatusFilter('semua')} className={`px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest shrink-0 transition-colors border ${historiStatusFilter === 'semua' ? 'bg-blue-600 text-white border-blue-500' : 'bg-slate-800 text-slate-400 border-slate-700'}`}>Semua</button>
                                    <button onClick={() => setHistoriStatusFilter('sukses')} className={`px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest shrink-0 transition-colors border ${historiStatusFilter === 'sukses' ? 'bg-emerald-600 text-white border-emerald-500' : 'bg-slate-800 text-slate-400 border-slate-700'}`}>Sukses</button>
                                    <button onClick={() => setHistoriStatusFilter('pending')} className={`px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest shrink-0 transition-colors border ${historiStatusFilter === 'pending' ? 'bg-orange-600 text-white border-orange-500' : 'bg-slate-800 text-slate-400 border-slate-700'}`}>Pending</button>
                                    <button onClick={() => setHistoriStatusFilter('cancel')} className={`px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest shrink-0 transition-colors border ${historiStatusFilter === 'cancel' ? 'bg-red-600 text-white border-red-500' : 'bg-slate-800 text-slate-400 border-slate-700'}`}>Cancel</button>
                                </div>
                                <div className="space-y-3">
                                    {historiPkgs.length === 0 ? (
                                        <div className="text-center py-12 bg-slate-800/50 rounded-3xl border border-dashed border-slate-700"><p className="text-xs text-slate-500 font-bold uppercase tracking-widest">Tidak ada riwayat.</p></div>
                                    ) : historiPkgs.map((pkg, i) => {
                                        const stat = String(pkg.status).toUpperCase().replace('_', ' ');
                                        let bgBadge = 'bg-slate-800 text-slate-400 border-slate-700';
                                        if (stat === 'SUKSES') bgBadge = 'bg-emerald-900/30 text-emerald-400 border-emerald-800/50';
                                        if (stat === 'PENDING') bgBadge = 'bg-orange-900/30 text-orange-400 border-orange-800/50';
                                        if (stat === 'CANCEL' || stat === 'BATAL') bgBadge = 'bg-red-900/30 text-red-400 border-red-800/50';
                                        const resolvedUrlFoto = getFotoUrl(pkg.fotoBukti);
                                        return (
                                            <div key={i} onClick={() => setDetailPkg(pkg)} className="bg-slate-800 border border-slate-700 rounded-2xl py-3 pr-3 flex justify-between items-center shadow-lg relative overflow-hidden cursor-pointer active:scale-[0.98] transition-transform">
                                                <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${stat === 'SUKSES' ? 'bg-emerald-500' : (stat === 'PENDING' ? 'bg-orange-500' : 'bg-red-500')}`}></div>
                                                {resolvedUrlFoto ? (
                                                    <img src={resolvedUrlFoto} loading="lazy" className="w-10 h-10 rounded object-cover border border-slate-700 shrink-0 ml-3" />
                                                ) : (
                                                    <div className="w-10 h-10 rounded bg-slate-900 border border-slate-700 flex items-center justify-center shrink-0 ml-3"><i className="fas fa-image text-slate-600 text-xs"></i></div>
                                                )}
                                                <div className="pl-3 flex-1 min-w-0">
                                                    <p className="font-bold text-white text-xs truncate mb-1">{pkg.customerName}</p>
                                                    {pkg.customerPhone && <p className="text-[9px] text-slate-400 mb-0.5 font-bold"><i className="fas fa-phone mr-1.5 text-emerald-500"></i>{pkg.customerPhone}</p>}
                                                    <p className="text-[9px] text-slate-500 truncate font-mono">{pkg.packageId} • <span className="text-orange-400/80 font-sans font-bold">{pkg.olshopName}</span></p>
                                                </div>
                                                <div className="flex flex-col items-end shrink-0 pl-2">
                                                    <span className={`text-[8px] font-bold px-2.5 py-1 rounded uppercase tracking-widest border ${bgBadge}`}>{stat === 'SIAP ANTAR' || stat === 'PROSES' ? 'PROSES' : stat}</span>
                                                    <span className="text-sm font-black text-blue-400 mt-1.5">{formatCurr(pkg.totalTagihan)}</span>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )}

                        {/* TAB REKAP OLSHOP */}
                        {activeTab === 'rekap' && (
                            <div className="animate-fade-in-down px-1">
                                <h2 className="font-black text-white text-lg mb-4 flex items-center"><i className="fas fa-clipboard-list text-purple-500 mr-2"></i> Rekap Olshop</h2>
                                <div className="mb-3 relative">
                                    <i className="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500 text-sm"></i>
                                    <input type="text" placeholder="Cari nama olshop..." value={rekapOlshopSearch} onChange={e=>setRekapOlshopSearch(e.target.value)} className="w-full pl-10 pr-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-xs outline-none focus:border-purple-500 text-white placeholder-slate-500 transition-colors shadow-sm" />
                                </div>
                                <div className="bg-slate-800 p-3 rounded-xl shadow-sm border border-slate-700 mb-4 flex items-center gap-2">
                                    <div className="flex-1 relative">
                                        <i className="far fa-calendar-alt absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500 text-[10px]"></i>
                                        <input type="date" value={rekapStartDate} onChange={e=>setRekapStartDate(e.target.value)} className="w-full pl-8 pr-2 py-2 bg-slate-900 border border-slate-600 rounded-lg text-[10px] outline-none focus:border-purple-500 text-slate-300 font-bold" />
                                    </div>
                                    <span className="text-[10px] font-bold text-slate-500">s/d</span>
                                    <div className="flex-1 relative">
                                        <i className="far fa-calendar-alt absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500 text-[10px]"></i>
                                        <input type="date" value={rekapEndDate} onChange={e=>setRekapEndDate(e.target.value)} className="w-full pl-8 pr-2 py-2 bg-slate-900 border border-slate-600 rounded-lg text-[10px] outline-none focus:border-purple-500 text-slate-300 font-bold" />
                                    </div>
                                </div>
                                
                                <div className="grid grid-cols-4 gap-2 mb-4">
                                    <div className="bg-slate-800 border border-slate-700 p-2 rounded-xl text-center shadow-md"><p className="text-[8px] text-slate-400 font-bold uppercase mb-1">Sukses</p><p className="font-black text-emerald-400 text-sm">{rekapDataObj.stats.r_sukses}</p></div>
                                    <div className="bg-slate-800 border border-slate-700 p-2 rounded-xl text-center shadow-md"><p className="text-[8px] text-slate-400 font-bold uppercase mb-1">Siap Antar</p><p className="font-black text-blue-400 text-sm">{rekapDataObj.stats.r_proses}</p></div>
                                    <div className="bg-slate-800 border border-slate-700 p-2 rounded-xl text-center shadow-md"><p className="text-[8px] text-slate-400 font-bold uppercase mb-1">Pending</p><p className="font-black text-orange-400 text-sm">{rekapDataObj.stats.r_pending}</p></div>
                                    <div className="bg-slate-800 border border-slate-700 p-2 rounded-xl text-center shadow-md"><p className="text-[8px] text-slate-400 font-bold uppercase mb-1">Cancel</p><p className="font-black text-red-400 text-sm">{rekapDataObj.stats.r_cancel}</p></div>
                                </div>
                                
                                <div className="space-y-3">
                                    {rekapDataObj.list.length === 0 ? (
                                        <div className="text-center py-12 bg-slate-800/50 rounded-3xl border border-dashed border-slate-700"><p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Tidak ada data sukses.</p></div>
                                    ) : rekapDataObj.list.map((ol, i) => (
                                        <div key={i} className="bg-slate-800 border border-slate-700 rounded-2xl p-4 shadow-lg">
                                            <div className="flex justify-between items-center mb-3">
                                                <h3 className="font-black text-white text-sm flex items-center"><i className="fas fa-store text-orange-400 mr-2"></i>{ol.name}</h3>
                                                <span className="bg-slate-900 text-slate-300 text-[9px] font-bold px-2 py-1 rounded border border-slate-700">{ol.qty} Pkt Sukses</span>
                                            </div>
                                            <div className="grid grid-cols-2 gap-2 text-[10px]">
                                                <div className="bg-slate-900 p-2 rounded-lg border border-slate-700/50"><span className="block text-slate-500 mb-0.5">Uang Barang</span><span className="font-bold text-emerald-400">{formatCurr(ol.cash)}</span></div>
                                                <div className="bg-slate-900 p-2 rounded-lg border border-slate-700/50"><span className="block text-slate-500 mb-0.5">Potong (TF)</span><span className="font-bold text-red-400">{formatCurr(ol.tf)}</span></div>
                                            </div>
                                            <div className="mt-2 pt-2 border-t border-slate-700 flex justify-between items-center">
                                                <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Total Bersih Pkt</span>
                                                <span className={`text-sm font-black ${ol.totalPencairan >= 0 ? 'text-blue-400' : 'text-red-400'}`}>{formatCurr(ol.totalPencairan)}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* TAB SALDO */}
                        {activeTab === 'saldo' && (
                            <div className="animate-fade-in-down px-1">
                                <h2 className="font-black text-white text-lg mb-4 flex items-center"><i className="fas fa-wallet text-emerald-500 mr-2"></i> Saldo Setoran</h2>
                                <div className="bg-slate-800 p-3 rounded-xl shadow-sm border border-slate-700 mb-4 flex items-center gap-2">
                                    <div className="flex-1 relative">
                                        <i className="far fa-calendar-alt absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500 text-[10px]"></i>
                                        <input type="date" value={saldoStartDate} onChange={e=>setSaldoStartDate(e.target.value)} className="w-full pl-8 pr-2 py-2 bg-slate-900 border border-slate-600 rounded-lg text-[10px] outline-none focus:border-emerald-500 text-slate-300 font-bold" />
                                    </div>
                                    <span className="text-[10px] font-bold text-slate-500">s/d</span>
                                    <div className="flex-1 relative">
                                        <i className="far fa-calendar-alt absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500 text-[10px]"></i>
                                        <input type="date" value={saldoEndDate} onChange={e=>setSaldoEndDate(e.target.value)} className="w-full pl-8 pr-2 py-2 bg-slate-900 border border-slate-600 rounded-lg text-[10px] outline-none focus:border-emerald-500 text-slate-300 font-bold" />
                                    </div>
                                </div>
                                <div className="bg-gradient-to-br from-blue-900 to-slate-900 rounded-3xl p-6 text-white shadow-xl relative overflow-hidden mb-4 border border-blue-500/30">
                                    <div className="absolute -right-4 -bottom-4 opacity-10"><i className="fas fa-money-bill-wave text-[100px] text-blue-200"></i></div>
                                    <p className="text-[10px] text-blue-300 font-bold uppercase tracking-widest mb-1">WAJIB SETOR (KANTOR)</p>
                                    <h2 className={`text-4xl font-black mb-4 tracking-tight ${setoran < 0 ? 'text-red-400' : 'text-white'}`}>{formatCurr(setoran)}</h2>
                                    <div className="flex justify-between items-end border-t border-blue-500/30 pt-3">
                                        <div className="flex gap-4 w-full">
                                            <div className="flex-1"><p className="text-[8px] text-blue-300/80 font-bold uppercase tracking-widest mb-0.5">Sukses</p><p className="text-xs font-black text-white">{s_sukses}</p></div>
                                            <div className="flex-1"><p className="text-[8px] text-blue-300/80 font-bold uppercase tracking-widest mb-0.5">Siap Antar</p><p className="text-xs font-black text-blue-300">{s_proses}</p></div>
                                            <div className="flex-1"><p className="text-[8px] text-blue-300/80 font-bold uppercase tracking-widest mb-0.5">Pending</p><p className="text-xs font-black text-orange-300">{s_pending}</p></div>
                                            <div className="flex-1"><p className="text-[8px] text-blue-300/80 font-bold uppercase tracking-widest mb-0.5">Cancel</p><p className="text-xs font-black text-red-300">{s_cancel}</p></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3 mb-3">
                                    <div className="bg-slate-800 border border-slate-700 p-4 rounded-2xl text-center shadow-lg"><p className="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1.5"><i className="fas fa-hand-holding-usd text-emerald-500 mr-1"></i> Uang Cash</p><p className="font-black text-emerald-400 text-base">{formatCurr(rincianCash)}</p></div>
                                    <div className="bg-slate-800 border border-slate-700 p-4 rounded-2xl text-center shadow-lg"><p className="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1.5"><i className="fas fa-wallet text-orange-500 mr-1"></i> Simpan (Cash)</p><p className="font-black text-orange-400 text-base">{formatCurr(tambahanOngkirCash)}</p></div>
                                </div>
                                <div className="bg-slate-800 border border-slate-700 p-4 rounded-2xl text-center shadow-lg"><p className="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1.5"><i className="fas fa-cut text-purple-500 mr-1"></i> Potong TF (Hak Kurir/Olshop)</p><p className="font-black text-purple-400 text-base">{formatCurr(tambahanOngkirTF)}</p></div>
                            </div>
                        )}

                    </main>

                    {}
                    {/* BOTTOM NAV (NAVY/ORANGE THEME) */}
                    <nav className="absolute bottom-0 w-full bg-slate-900/95 backdrop-blur-md border-t border-slate-800 flex justify-between pb-6 pt-3 px-1.5 z-40 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.5)]">
                        <button onClick={() => setActiveTab('tugas')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'tugas' ? 'text-blue-500' : 'text-slate-500'}`}><i className="fas fa-motorcycle text-xl mb-1"></i><span className="text-[8px] font-bold tracking-widest uppercase">Antar</span></button>
                        <button onClick={() => setActiveTab('jemput')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'jemput' ? 'text-blue-500' : 'text-slate-500'}`}><i className="fas fa-truck-pickup text-xl mb-1"></i><span className="text-[8px] font-bold tracking-widest uppercase">Jemput</span></button>
                        <button onClick={() => setActiveTab('rute')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'rute' ? 'text-blue-500' : 'text-slate-500'}`}><i className="fas fa-route text-xl mb-1"></i><span className="text-[8px] font-bold tracking-widest uppercase">Rute</span></button>
                        <div className="relative -top-5 flex-shrink-0 px-2"><button onClick={() => setActiveTab('input')} className="w-12 h-12 bg-blue-600 text-white rounded-full shadow-lg shadow-blue-900/50 flex items-center justify-center text-lg border-4 border-slate-900 active:scale-95 transition-transform"><i className="fas fa-plus"></i></button></div>
                        <button onClick={() => setActiveTab('histori')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'histori' ? 'text-blue-500' : 'text-slate-500'}`}><i className="fas fa-history text-xl mb-1"></i><span className="text-[8px] font-bold tracking-widest uppercase">Histori</span></button>
                        <button onClick={() => setActiveTab('rekap')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'rekap' ? 'text-blue-500' : 'text-slate-500'}`}><i className="fas fa-clipboard-list text-xl mb-1"></i><span className="text-[8px] font-bold tracking-widest uppercase">Rekap</span></button>
                        <button onClick={() => setActiveTab('saldo')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'saldo' ? 'text-blue-500' : 'text-slate-500'}`}><i className="fas fa-wallet text-xl mb-1"></i><span className="text-[8px] font-bold tracking-widest uppercase">Saldo</span></button>
                    </nav>

                    {}
                    {/* MODAL LAPORAN SCREENSHOT (DIPERBAIKI KARENA TERPOTONG SEBELUMNYA) */}
                    {detailPkg && !isModalOpen && !isEditAdminModalOpen && (
                        <div className="fixed inset-0 z-[100] bg-black/90 flex flex-col justify-center items-center p-5 animate-fade-in-down backdrop-blur-sm" onClick={() => setDetailPkg(null)}>
                            <div className="bg-slate-900 rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl relative border border-slate-700" onClick={(e) => e.stopPropagation()}>
                                <div className="flex justify-between items-center p-4 border-b border-slate-800 bg-slate-800/50">
                                    <h3 className="text-white font-bold text-sm">Bukti Foto / Detail</h3>
                                    <button onClick={() => setDetailPkg(null)} className="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-slate-400 hover:text-white transition-colors border border-slate-700"><i className="fas fa-times"></i></button>
                                </div>
                                <div className="p-4 flex justify-center items-center">
                                    {getFotoUrl(detailPkg.fotoBukti) ? (
                                        <img src={getFotoUrl(detailPkg.fotoBukti)} alt="Foto Bukti" className="w-full max-h-[60vh] object-contain rounded-xl border border-slate-700" />
                                    ) : (
                                        <div className="py-12 text-center text-slate-500">
                                            <i className="fas fa-image text-4xl mb-3 opacity-50"></i>
                                            <p className="text-xs font-bold uppercase tracking-widest">Tidak ada foto dilampirkan</p>
                                        </div>
                                    )}
                                </div>
                                <div className="p-4 bg-slate-800/50 border-t border-slate-800 text-center">
                                    <p className="text-white font-bold mb-1">{detailPkg.customerName}</p>
                                    <p className="text-xs text-slate-400 font-mono">{detailPkg.packageId}</p>
                                </div>
                            </div>
                        </div>
                    )}
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
