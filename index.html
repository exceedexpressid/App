<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driver - Exceed Express</title>
    
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>

    <style>
        body { 
            background-color: #f3f4f6; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overscroll-behavior-y: none; 
            -webkit-tap-highlight-color: transparent;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.2s ease-out forwards; }
        
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .dragging { opacity: 0.5; background: #f0fdf4; border: 1px dashed #10b981; }
    </style>
</head>
<body class="antialiased flex justify-center bg-gray-200 h-[100dvh] overflow-hidden">
    <div id="root" class="w-full max-w-md bg-gray-50 shadow-2xl h-full flex flex-col relative"></div>

    <script type="text/babel" data-presets="env,react">
        /** @jsx React.createElement */
        /** @jsxFrag React.Fragment */
        
        const { useState, useEffect, useRef } = React;

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVHojspm17WSZU42RaMtgiNWJikRfGyTlPh1FczlDJS9JL52PxX0d9RpkNJYM4g424/exec";
        const APPSHEET_APP_ID = "APLIKASEXCEED-327461285";

        const formatCurr = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num || 0);
        
        const getFotoUrl = (fileKey) => {
            if (!fileKey || String(fileKey).trim() === '') return null;
            if (String(fileKey).startsWith('http://') || String(fileKey).startsWith('https://')) return fileKey;
            return `https://www.appsheet.com/template/gettablefileurl?appName=${APPSHEET_APP_ID}&tableName=InputPaket&fileName=${encodeURIComponent(fileKey)}`;
        };

        const formatWA = (phone) => {
            if(!phone) return '';
            let p = String(phone).replace(/\D/g, '');
            if(p.startsWith('0')) p = '62' + p.substring(1);
            return p;
        };

        const getFinancials = (pkg) => {
            const hBarang = Number(pkg.hargaPaket) || 0;
            const tagihan = Number(pkg.totalTagihan) || 0;
            const selisihTagihan = tagihan - hBarang > 0 ? tagihan - hBarang : 0;
            let oTambahan = Number(pkg.tambahanOngkir) || 0;
            let oDasar = Number(pkg.ongkirDasar) || 0;
            if (oTambahan === 0 && oDasar > 0 && selisihTagihan > oDasar) oTambahan = selisihTagihan - oDasar;
            else if (oTambahan === 0 && oDasar === 0 && selisihTagihan > 0) oDasar = selisihTagihan;
            if (oDasar === 0 && oTambahan > 0 && selisihTagihan > oTambahan) oDasar = selisihTagihan - oTambahan;
            return { hBarang, tagihan, oDasar, oTambahan, oTotal: oDasar + oTambahan };
        };

        function App() {
            const [kurirId, setKurirId] = useState(localStorage.getItem('ex_gojek_kurirId') || '');
            const [kurirName, setKurirName] = useState(localStorage.getItem('ex_gojek_kurirName') || '');
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('ex_gojek_kurirId'));
            
            const [activeTab, setActiveTab] = useState('tugas'); 
            const [tugasViewMode, setTugasViewMode] = useState('standard'); 
            
            const [isLoading, setIsLoading] = useState(false);
            const [loadingMessage, setLoadingMessage] = useState('');
            
            const [packages, setPackages] = useState([]);
            const [jemputans, setJemputans] = useState([]);
            const [masterOlshops, setMasterOlshops] = useState([]);
            const [masterZonas, setMasterZonas] = useState([]);
            
            const [routeOrder, setRouteOrder] = useState(() => JSON.parse(localStorage.getItem('ex_gojek_routeOrder') || '[]'));
            const [routeItems, setRouteItems] = useState([]); 
            const [draggedItemIndex, setDraggedItemIndex] = useState(null);

            const [historiStatusFilter, setHistoriStatusFilter] = useState('semua');
            const [historiStartDate, setHistoriStartDate] = useState('');
            const [historiEndDate, setHistoriEndDate] = useState('');
            
            const [saldoStartDate, setSaldoStartDate] = useState(new Date().toISOString().split('T')[0]);
            const [saldoEndDate, setSaldoEndDate] = useState(new Date().toISOString().split('T')[0]);

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedPkg, setSelectedPkg] = useState(null);
            const [updateStatusVal, setUpdateStatusVal] = useState(''); // Tracking status modal update
            
            const [inputOlshopSearch, setInputOlshopSearch] = useState(''); // Fitur Pencarian Olshop
            const [showOlshopDropdown, setShowOlshopDropdown] = useState(false);

            const [cameraStream, setCameraStream] = useState(null);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [capturedPhoto, setCapturedPhoto] = useState(null);

            const [viewImage, setViewImage] = useState(null);

            const loadData = async (forceLoginId = null) => {
                setIsLoading(true); setLoadingMessage('Menyinkronkan Data...');
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=getInitData&t=${new Date().getTime()}`);
                    const data = await res.json();
                    if(data.status === 'success') {
                        setMasterOlshops(data.data.olshop || []); setMasterZonas(data.data.zona || []);
                        const currentId = forceLoginId || kurirId;
                        const isMaster = currentId === 'exceedexpress.id@gmail.com';
                        if (currentId) {
                            const myPkgs = data.data.packages.filter(p => isMaster || String(p.kurirEmailAsli).toLowerCase() === currentId.toLowerCase() || String(p.kurirId).toLowerCase() === currentId.toLowerCase());
                            setPackages(myPkgs.reverse());
                            const myJemputans = (data.data.jemputan || []).filter(j => isMaster || String(j.status).toLowerCase() === 'menunggu' || String(j.status).trim() === '' || String(j.kurirId).toLowerCase() === currentId.toLowerCase() || String(j.kurirNama).toLowerCase() === kurirName.toLowerCase());
                            setJemputans(myJemputans.reverse());
                        }
                    }
                } catch(e) { alert("Koneksi terputus. Pastikan internet stabil."); }
                setIsLoading(false);
            };

            useEffect(() => { if (isLoggedIn) loadData(); }, [isLoggedIn]);

            const handleLogin = async (e) => {
                e.preventDefault();
                const inputId = e.target.kodeUser.value.trim().toLowerCase();
                const inputPass = e.target.password.value.trim(); 
                if (inputId === 'exceedexpress.id@gmail.com' && inputPass === 'adminexceed') {
                    localStorage.setItem('ex_gojek_kurirId', inputId); localStorage.setItem('ex_gojek_kurirName', 'Master Admin');
                    setKurirId(inputId); setKurirName('Master Admin'); setIsLoggedIn(true); loadData(inputId); return;
                }
                setIsLoading(true); setLoadingMessage('Memverifikasi Akun...');
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=getInitData`);
                    const data = await res.json();
                    if(data.status === 'success') {
                        const validKurir = (data.data.kurir || []).find(k => String(k.id).toLowerCase() === inputId);
                        if (validKurir) {
                            localStorage.setItem('ex_gojek_kurirId', validKurir.id); localStorage.setItem('ex_gojek_kurirName', validKurir.nama);
                            setKurirId(validKurir.id); setKurirName(validKurir.nama); setIsLoggedIn(true); loadData(validKurir.id);
                        } else { alert("ID Kurir tidak terdaftar."); }
                    }
                } catch (e) { alert("Gagal memverifikasi login."); }
                setIsLoading(false);
            };

            const handleLogout = () => {
                if(window.confirm("Yakin ingin keluar?")) {
                    localStorage.removeItem('ex_gojek_kurirId'); localStorage.removeItem('ex_gojek_kurirName'); 
                    setIsLoggedIn(false); setPackages([]); setJemputans([]);
                }
            };

            useEffect(() => {
                if (activeTab === 'rute') {
                    const activePkgs = packages.filter(p => { const s = String(p.status).toLowerCase().replace(' ', '_'); return s === 'proses' || s === 'siap_antar' || s === 'pending'; });
                    activePkgs.sort((a, b) => {
                        const posA = routeOrder.indexOf(a.packageId) !== -1 ? routeOrder.indexOf(a.packageId) : 99999;
                        const posB = routeOrder.indexOf(b.packageId) !== -1 ? routeOrder.indexOf(b.packageId) : 99999;
                        return posA - posB;
                    });
                    setRouteItems(activePkgs);
                }
            }, [activeTab, packages, routeOrder]);

            const moveRouteUp = (index) => { if (index === 0) return; const newItems = [...routeItems]; [newItems[index - 1], newItems[index]] = [newItems[index], newItems[index - 1]]; setRouteItems(newItems); };
            const moveRouteDown = (index) => { if (index === routeItems.length - 1) return; const newItems = [...routeItems]; [newItems[index + 1], newItems[index]] = [newItems[index], newItems[index + 1]]; setRouteItems(newItems); };
            const handleDragStart = (e, index) => { setDraggedItemIndex(index); e.dataTransfer.effectAllowed = 'move'; };
            const handleDragOver = (e, index) => { e.preventDefault(); if (draggedItemIndex === null || draggedItemIndex === index) return; const newItems = [...routeItems]; const draggedItem = newItems[draggedItemIndex]; newItems.splice(draggedItemIndex, 1); newItems.splice(index, 0, draggedItem); setDraggedItemIndex(index); setRouteItems(newItems); };
            const handleDragEnd = () => { setDraggedItemIndex(null); };

            const saveRoute = () => {
                const newOrder = routeItems.map(p => p.packageId);
                setRouteOrder(newOrder); localStorage.setItem('ex_gojek_routeOrder', JSON.stringify(newOrder));
                alert("Berhasil! Rute pengantaran sudah diperbarui."); setActiveTab('tugas');
            };

            const startCamera = async () => { try { const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }); setCameraStream(stream); if (videoRef.current) videoRef.current.srcObject = stream; } catch (err) { alert("Izin kamera ditolak."); } };
            const stopCamera = () => { if (cameraStream) { cameraStream.getTracks().forEach(track => track.stop()); setCameraStream(null); } };
            const takePhoto = () => { if (videoRef.current && canvasRef.current) { const video = videoRef.current; const canvas = canvasRef.current; canvas.width = video.videoWidth; canvas.height = video.videoHeight; canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height); setCapturedPhoto(canvas.toDataURL('image/jpeg', 0.6)); stopCamera(); } };
            const retakePhoto = () => { setCapturedPhoto(null); startCamera(); };

            useEffect(() => { if (!isModalOpen && activeTab !== 'input') { stopCamera(); setCapturedPhoto(null); } }, [isModalOpen, activeTab]);

            const openUpdateModal = (pkg) => {
                setSelectedPkg(pkg);
                setUpdateStatusVal(String(pkg.status).toUpperCase() === 'PROSES' ? 'SIAP_ANTAR' : String(pkg.status).toUpperCase());
                setIsModalOpen(true);
            };

            const handleUpdateStatus = async (e) => {
                e.preventDefault();
                const nStatus = e.target.status.value;
                const nKet = e.target.keterangan ? e.target.keterangan.value : "";
                
                // Cek Metode Bayar (Muncul hanya ketika SUKSES)
                const nMetode = e.target.metodeBayarUpdate ? e.target.metodeBayarUpdate.value : "";

                if (nStatus === 'SUKSES' && !capturedPhoto) { alert("Wajib foto bukti untuk paket SUKSES!"); return; }
                setIsLoading(true); setLoadingMessage('Menyimpan Status...');
                try {
                    const formData = new URLSearchParams(); 
                    formData.append('action', 'updateStatus'); 
                    formData.append('packageId', selectedPkg.packageId); 
                    formData.append('status', nStatus); 
                    formData.append('keterangan', nKet);
                    
                    if (nMetode !== "") {
                        formData.append('metodeBayar', nMetode);
                    }

                    if (capturedPhoto) formData.append('fotoBase64', capturedPhoto);
                    
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
                    const result = await response.json();
                    if (result.status === 'success') { alert("Berhasil diupdate!"); setIsModalOpen(false); loadData(); } else { alert("Gagal: " + result.message); }
                } catch (error) { alert("Error jaringan."); } finally { setIsLoading(false); }
            };

            const handleInputBaru = async (e) => {
                e.preventDefault();
                // Mengambil value dari input pencarian state (bukan select)
                const olshopName = inputOlshopSearch; 
                const customerName = e.target.customerName.value; const address = e.target.address.value;
                if (!olshopName || !customerName || !address) { alert("Olshop, Customer, dan Alamat wajib!"); return; }
                const hargaPaket = e.target.hargaPaket.value || 0; const zonaSelect = e.target.ongkirKode; const ongkirDasar = zonaSelect.options[zonaSelect.selectedIndex].getAttribute('data-harga') || 0; const tambahanOngkir = e.target.tambahanOngkir.value || 0;
                setIsLoading(true); setLoadingMessage('Mendaftar Resi...');
                try {
                    const idPaket = "EXCD" + Math.floor(100000 + Math.random() * 900000);
                    const formData = new URLSearchParams(); formData.append('action', 'addPackage'); formData.append('idPaket', idPaket); formData.append('olshopName', olshopName); formData.append('customerName', customerName); formData.append('customerPhone', e.target.customerPhone.value); formData.append('address', address); formData.append('hargaPaket', hargaPaket); formData.append('ongkirDasar', ongkirDasar); formData.append('tambahanOngkir', tambahanOngkir); formData.append('metodeBayar', e.target.metodeBayar.value); formData.append('kurirId', kurirId);
                    if (capturedPhoto) formData.append('fotoBase64', capturedPhoto);
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
                    const result = await response.json();
                    if (result.status === 'success') { 
                        alert(`Berhasil! RESI: ${idPaket}`); 
                        e.target.reset(); 
                        setInputOlshopSearch(''); 
                        setCapturedPhoto(null); 
                        setActiveTab('tugas'); 
                        loadData(); 
                    } else { alert("Gagal: " + result.message); }
                } catch (error) { alert("Error jaringan."); } finally { setIsLoading(false); }
            };

            const handleAmbilJemputan = async (idJemput) => {
                if(!window.confirm("Ambil tugas jemputan ini?")) return;
                setIsLoading(true); setLoadingMessage('Mengambil Tugas...');
                try {
                    const formData = new URLSearchParams(); formData.append('action', 'ambilJemputan'); formData.append('idJemput', idJemput); formData.append('kurirId', kurirId); formData.append('kurirNama', kurirName);
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
                    const result = await response.json();
                    if (result.status === 'success') { alert("Berhasil! Tugas ini sekarang milik Anda."); loadData(); } else { alert("Gagal: " + result.message); }
                } catch (error) { alert("Error jaringan."); } finally { setIsLoading(false); }
            };

            const handleSelesaiJemputan = async (idJemput) => {
                if(!window.confirm("Tandai jemputan selesai?")) return;
                setIsLoading(true); setLoadingMessage('Menyelesaikan Tugas...');
                try {
                    const formData = new URLSearchParams(); formData.append('action', 'selesaiJemputan'); formData.append('idJemput', idJemput);
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
                    const result = await response.json();
                    if (result.status === 'success') { alert("Jemputan Selesai!"); loadData(); } else { alert("Gagal: " + result.message); }
                } catch (error) { alert("Error jaringan."); } finally { setIsLoading(false); }
            };

            const tugasAktifRaw = packages.filter(p => { const s = String(p.status).toLowerCase().replace(' ', '_'); return s === 'proses' || s === 'siap_antar' || s === 'pending'; });
            const tugasAktif = [...tugasAktifRaw].sort((a, b) => {
                const isPendingA = String(a.status).toLowerCase() === 'pending'; const isPendingB = String(b.status).toLowerCase() === 'pending';
                if (isPendingA && !isPendingB) return 1; if (!isPendingA && isPendingB) return -1; 
                const posA = routeOrder.indexOf(a.packageId) !== -1 ? routeOrder.indexOf(a.packageId) : 99999;
                const posB = routeOrder.indexOf(b.packageId) !== -1 ? routeOrder.indexOf(b.packageId) : 99999;
                return posA - posB;
            });

            let historiPkgs = packages.filter(p => {
                const s = String(p.status).toLowerCase().replace(' ', '_');
                if (historiStatusFilter === 'semua') return s === 'sukses' || s === 'cancel' || s === 'batal' || s === 'pending';
                if (historiStatusFilter === 'cancel') return s === 'cancel' || s === 'batal';
                return s === historiStatusFilter;
            });

            if (historiStartDate || historiEndDate) {
               historiPkgs = historiPkgs.filter(p => {
                  let pDateStr = p.dateString || p.tanggalInput || p.tanggal || '';
                  if (!pDateStr) return false; let normalizedDateStr = "";
                  try {
                      let d = new Date(pDateStr);
                      if (isNaN(d.getTime()) && pDateStr.includes('/')) { const parts = pDateStr.split('/'); if (parts.length === 3) d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); }
                      if (!isNaN(d.getTime())) { const year = d.getFullYear(); const month = String(d.getMonth() + 1).padStart(2, '0'); const day = String(d.getDate()).padStart(2, '0'); normalizedDateStr = `${year}-${month}-${day}`; } 
                      else { normalizedDateStr = pDateStr.split('T')[0]; }
                  } catch(e) { normalizedDateStr = pDateStr.split('T')[0]; }
                  const sD = historiStartDate || "2000-01-01"; const eD = historiEndDate || "2100-01-01";
                  return normalizedDateStr >= sD && normalizedDateStr <= eD;
               });
            }

            let saldoPkgs = packages.filter(p => String(p.status).toLowerCase() === 'sukses');
            if (saldoStartDate || saldoEndDate) {
               saldoPkgs = saldoPkgs.filter(p => {
                  let pDateStr = p.dateString || p.tanggal || '';
                  if (!pDateStr) return false; let normalizedDateStr = "";
                  try {
                      let d = new Date(pDateStr);
                      if (isNaN(d.getTime()) && pDateStr.includes('/')) { const parts = pDateStr.split('/'); if (parts.length === 3) d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); }
                      if (!isNaN(d.getTime())) { const year = d.getFullYear(); const month = String(d.getMonth() + 1).padStart(2, '0'); const day = String(d.getDate()).padStart(2, '0'); normalizedDateStr = `${year}-${month}-${day}`; } 
                      else { normalizedDateStr = pDateStr.split('T')[0]; }
                  } catch(e) { normalizedDateStr = pDateStr.split('T')[0]; }
                  const sD = saldoStartDate || "2000-01-01"; const eD = saldoEndDate || "2100-01-01";
                  return normalizedDateStr >= sD && normalizedDateStr <= eD;
               });
            }

            let s_sukses = 0, setoran = 0, rincianCash = 0, tambahanOngkirCash = 0, tambahanOngkirTF = 0;
            saldoPkgs.forEach(pkg => {
                s_sukses++; const { hBarang, oDasar, oTambahan, oTotal } = getFinancials(pkg); const metode = String(pkg.metodeBayar).trim().toUpperCase();
                let currentSetoran = 0;
                if (metode === 'TF OLSHOP' || metode === 'TF KANTOR') { tambahanOngkirTF += oTambahan; currentSetoran = -oTambahan; } 
                else if (metode === 'CASH' || metode === 'COD') { const cashDiterima = hBarang + oDasar + oTambahan; rincianCash += cashDiterima; tambahanOngkirCash += oTambahan; currentSetoran = hBarang + oDasar; }
                setoran += currentSetoran;
            });

            if (!isLoggedIn) {
                return (
                    <div className="flex h-full items-center justify-center p-6 bg-white w-full">
                        <div className="w-full">
                            <div className="flex justify-center mb-6">
                                <div className="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center">
                                    <i className="fas fa-motorcycle text-4xl text-emerald-600"></i>
                                </div>
                            </div>
                            <h1 className="text-2xl font-black text-gray-800 text-center mb-1">Driver App</h1>
                            <p className="text-xs text-gray-500 text-center mb-8">Login dengan akun kurir Anda</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="block text-[10px] font-bold text-gray-700 mb-1 ml-1">Email / ID Kurir</label>
                                    <input type="text" name="kodeUser" required className="w-full px-3 py-2.5 bg-gray-100 border border-gray-200 rounded-xl focus:outline-none focus:border-emerald-500 text-xs font-semibold" placeholder="Masukkan ID..." />
                                </div>
                                <div>
                                    <label className="block text-[10px] font-bold text-gray-700 mb-1 ml-1">Password</label>
                                    <input type="password" name="password" className="w-full px-3 py-2.5 bg-gray-100 border border-gray-200 rounded-xl focus:outline-none focus:border-emerald-500 text-xs font-semibold" placeholder="Masukkan Password..." />
                                </div>
                                <button type="submit" disabled={isLoading} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-emerald-600/30 transition-transform active:scale-95 mt-2 text-xs">
                                    {isLoading ? 'Masuk...' : 'Masuk'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <React.Fragment>
                    {isLoading && (
                        <div className="absolute inset-0 z-[999] bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center">
                            <div className="w-10 h-10 border-4 border-emerald-200 border-t-emerald-600 rounded-full animate-spin mb-2"></div>
                            <span className="text-[10px] font-bold text-emerald-800">{loadingMessage}</span>
                        </div>
                    )}

                    <header className="glass-nav h-14 flex items-center justify-between px-3 text-gray-800 shrink-0 z-20 border-b border-gray-100">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600"><i className="fas fa-user text-xs"></i></div>
                            <div className="flex flex-col">
                                <span className="font-bold text-[11px] leading-tight truncate w-32">{kurirName}</span>
                                <span className="text-[8px] font-bold text-emerald-600 flex items-center"><span className="w-1.5 h-1.5 bg-emerald-500 rounded-full mr-1 animate-pulse"></span> Online</span>
                            </div>
                        </div>
                        {/* TOMBOL REFRESH EXPLICIT DI HEADER */}
                        <div className="flex items-center gap-1.5">
                            <button onClick={() => loadData()} className="bg-white border border-gray-200 shadow-sm px-2.5 py-1.5 flex items-center justify-center rounded-lg hover:bg-gray-50 active:scale-95 text-gray-700 transition-all">

                        {}

                                                                <span className="font-bold text-[10px] text-gray-800 truncate">{pkg.customerName}</span>

                                                        <div className="flex items-center gap-1.5">
                                                            <div className="bg-gray-100 text-gray-700 font-mono text-[8px] font-black px-1.5 py-0.5 rounded border border-gray-200">{pkg.packageId}</div>

                                                        <span className={`text-[7px] font-bold px-1.5 py-0.5 rounded uppercase border ${pkg.metodeBayar === 'CASH' ? 'bg-emerald-50 text-emerald-600 border-emerald-200' : 'bg-purple-50 text-purple-600 border-purple-200'}`}>{pkg.metodeBayar}</span>

                                                            <div className="w-10 h-10 rounded-lg bg-gray-50 border border-dashed border-gray-300 flex items-center justify-center shrink-0"><i className="fas fa-image text-gray-300 text-xs"></i></div>

                                                            <h3 className="font-black text-gray-800 text-[11px] leading-tight truncate mb-0.5">{pkg.customerName}</h3>

                                                        </div>
                                                    </div>

                                                    <div className="mb-1.5 text-[7px] text-gray-500 bg-gray-50 p-1 rounded-lg border border-gray-100 grid grid-cols-3 gap-0.5 text-center">
                                                        <div><span className="block text-[6px] uppercase">Brg</span><span className="font-bold text-gray-700 text-[8.5px]">{formatCurr(hBarang)}</span></div>
                                                        <div className="border-l border-r border-gray-200"><span className="block text-[6px] uppercase">Ongkir</span><span className="font-bold text-gray-700 text-[8.5px]">{formatCurr(oDasar)}</span></div>
                                                        <div><span className="block text-[6px] uppercase">Tmbhn</span><span className="font-bold text-gray-700 text-[8.5px]">{formatCurr(oTambahan)}</span></div>

                                                    <div className="flex justify-between items-end">

                                                                    <a href={`tel:${pkg.customerPhone}`} className="w-6 h-6 rounded-md bg-blue-100 text-blue-600 flex items-center justify-center border border-blue-200"><i className="fas fa-phone-alt text-[8px]"></i></a>
                                                                </React.Fragment>
                                                            )}
                                                        </div>
                                                        <div className="flex items-center gap-2">
                                                            <div className="text-right">
                                                                <p className="text-[7px] text-blue-400 font-bold uppercase mb-0.5">Total</p>
                                                                <p className="font-black text-blue-600 text-[11px]">{formatCurr(pkg.totalTagihan)}</p>
                                                            </div>
                                                            <button onClick={() => openUpdateModal(pkg)} className="bg-emerald-600 text-white font-bold text-[8px] px-2.5 py-1.5 rounded-lg active:scale-95 uppercase">Update</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {}
                        {activeTab === 'rute' && (
                            <div className="animate-slide-up">
                                <div className="flex justify-between items-center mb-2 px-1">
                                    <h2 className="font-black text-gray-800 text-[12px] flex items-center"><i className="fas fa-route text-blue-500 mr-1.5"></i> Susun Rute</h2>

                                </div>

                                {routeItems.length === 0 ? (
                                    <div className="text-center py-8 text-gray-400 text-[10px]">Tidak ada paket aktif untuk disusun.</div>

                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                                        {routeItems.map((pkg, idx) => (

                                                    <button onClick={() => moveRouteUp(idx)} disabled={idx === 0} className="text-gray-400 disabled:opacity-20 p-0.5"><i className="fas fa-chevron-up text-[8px]"></i></button>
                                                    <i className="fas fa-grip-lines text-gray-300 text-[8px]"></i>
                                                    <button onClick={() => moveRouteDown(idx)} disabled={idx === routeItems.length - 1} className="text-gray-400 disabled:opacity-20 p-0.5"><i className="fas fa-chevron-down text-[8px]"></i></button>

                                                <div className="flex-1 min-w-0 pointer-events-none">
                                                    <div className="flex justify-between items-center">
                                                        <h3 className="font-bold text-gray-800 text-[10px] truncate">{pkg.customerName}</h3>
                                                        <span className="text-[7.5px] font-bold text-orange-500 truncate">{pkg.olshopName}</span>
                                                    </div>
                                                    <p className="text-[8px] text-gray-500 truncate leading-tight">{pkg.address}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {}
                        {activeTab === 'jemput' && (
                            <div className="animate-slide-up">
                                <div className="bg-blue-50 border border-blue-100 p-2.5 rounded-xl mb-3 flex items-start gap-2">
                                    <i className="fas fa-bullhorn text-blue-500 text-sm"></i>
                                    <div>
                                        <h3 className="font-bold text-blue-800 text-[11px]">Tugas Jemputan</h3>
                                        <p className="text-[9px] text-blue-600 mt-0.5 leading-tight">Daftar toko yang minta dipickup. Siapa cepat dia dapat!</p>
                                    </div>
                                </div>
                                {jemputans.length === 0 ? (
                                    <div className="text-center py-8 text-gray-400 text-[10px]">Belum ada request jemputan.</div>

                                    <div className="space-y-2">

                                            const isMenunggu = String(jpt.status).toLowerCase() === 'menunggu' || !jpt.status;

                                            return (
                                                <div key={i} className={`bg-white border ${isMilikSaya ? 'border-emerald-200' : 'border-gray-200'} rounded-xl p-2.5 shadow-sm`}>

                                                        <h3 className="font-black text-gray-800 text-[11px]">{jpt.olshopName}</h3>
                                                        <span className={`text-[7px] font-bold px-1.5 py-0.5 rounded ${isMenunggu ? 'bg-orange-100 text-orange-600' : 'bg-emerald-100 text-emerald-600'}`}>{isMenunggu ? 'TERSEDIA' : 'DIAMBIL'}</span>
                                                    </div>
                                                    <p className="text-[9px] text-gray-500 mb-2 truncate"><i className="fas fa-map-marker-alt w-3"></i> {jpt.address}</p>

                                                        <button onClick={() => handleAmbilJemputan(jpt.idJemput)} className="w-full bg-gray-800 text-white font-bold text-[9px] py-1.5 rounded-lg active:scale-95">Ambil Tugas</button>
                                                    ) : isMilikSaya ? (
                                                        <button onClick={() => handleSelesaiJemputan(jpt.idJemput)} className="w-full bg-emerald-100 text-emerald-700 font-bold text-[9px] py-1.5 rounded-lg border border-emerald-200 active:scale-95">Selesaikan Pickup</button>
                                                    ) : (
                                                        <div className="w-full bg-gray-100 text-gray-400 font-bold text-[9px] py-1.5 rounded-lg text-center">Diambil Kurir Lain</div>
                                                    )}
                                                </div>
                                            )
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {}
                        {activeTab === 'input' && (
                            <div className="animate-slide-up bg-white p-3 rounded-2xl border border-gray-100 shadow-sm">
                                <h2 className="font-black text-gray-800 mb-3 text-[12px] flex items-center"><div className="w-6 h-6 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mr-2"><i className="fas fa-plus text-[10px]"></i></div>Input Resi Baru</h2>

                                    {/* MENGGUNAKAN DROPDOWN PENCARIAN (SEARCHABLE) UNTUK OLSHOP */}

                                            required 
                                            autoComplete="off"
                                            value={inputOlshopSearch}
                                            onChange={(e) => { setInputOlshopSearch(e.target.value); setShowOlshopDropdown(true); }}
                                            onFocus={() => setShowOlshopDropdown(true)}
                                            className="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-[10px] font-semibold outline-none focus:border-emerald-500 relative z-50"
                                            placeholder="Ketik/Pilih Olshop..."

                                        {showOlshopDropdown && (
                                            <React.Fragment>
                                                <div className="fixed inset-0 z-40" onClick={() => setShowOlshopDropdown(false)}></div>

                                                        <li 
                                                            key={i} 
                                                            onClick={() => { setInputOlshopSearch(o.nama); setShowOlshopDropdown(false); }}
                                                            className="p-2 text-[10px] hover:bg-emerald-50 cursor-pointer border-b border-gray-100 font-bold text-gray-700"
                                                        >
                                                            {o.nama}
                                                        </li>
                                                    ))}
                                                    {masterOlshops.filter(o => o.nama.toLowerCase().includes(inputOlshopSearch.toLowerCase())).length === 0 && (
                                                        <li className="p-2 text-[10px] text-gray-400 italic">Toko tidak ditemukan</li>
                                                    )}
                                                </ul>
                                            </React.Fragment>
                                        )}
                                    </div>

                                    <div><label className="text-[8px] font-bold text-gray-500 uppercase block mb-1">Nama Penerima*</label><input type="text" name="customerName" required className="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-[10px] font-semibold" /></div>
                                    <div><label className="text-[8px] font-bold text-gray-500 uppercase block mb-1">No HP</label><input type="tel" name="customerPhone" className="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-[10px] font-semibold" /></div>
                                    <div><label className="text-[8px] font-bold text-gray-500 uppercase block mb-1">Alamat Lengkap*</label><textarea name="address" required rows="2" className="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-[10px] font-semibold"></textarea></div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div><label className="text-[8px] font-bold text-gray-500 uppercase block mb-1">Metode</label><select name="metodeBayar" className="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-[10px] font-semibold"><option value="CASH">CASH</option><option value="TF OLSHOP">TF OL</option><option value="COD">COD</option><option value="TF KANTOR">TF KTR</option></select></div>
                                        <div><label className="text-[8px] font-bold text-gray-500 uppercase block mb-1">Hrg Barang</label><input type="number" name="hargaPaket" className="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-[10px] font-semibold" /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2 relative z-0">
                                        <div>
                                            <label className="text-[8px] font-bold text-gray-500 uppercase block mb-1">Zona Ongkir</label>

                                                {masterZonas.map((z, i) => <option key={i} value={z.id} data-harga={z.harga}>{z.nama} (Rp {formatCurr(z.harga)})</option>)}
                                            </select>
                                        </div>
                                        <div><label className="text-[8px] font-bold text-gray-500 uppercase block mb-1">Tmbhn Vol</label><input type="number" name="tambahanOngkir" className="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-[10px] font-semibold" /></div>
                                    </div>
                                    
                                    {/* AKSES KAMERA LANGSUNG DI FORM INPUT (SIMPAN KE G-DRIVE VIA SERVER) */}

                                            {!cameraStream && !capturedPhoto && (<button type="button" onClick={startCamera} className="w-full py-4 text-gray-400 flex flex-col items-center"><i className="fas fa-camera text-sm mb-1"></i><span className="text-[8px] font-bold">Buka Kamera</span></button>)}
                                            <div className={`relative ${cameraStream && !capturedPhoto ? 'block' : 'hidden'}`}><video ref={videoRef} autoPlay playsInline className="w-full max-h-32 object-cover"></video><button type="button" onClick={takePhoto} className="absolute bottom-2 left-1/2 transform -translate-x-1/2 bg-white text-gray-800 w-8 h-8 rounded-full shadow-md flex items-center justify-center text-xs border-2 border-gray-100"><i className="fas fa-circle"></i></button></div>
                                            {capturedPhoto && (<div className="relative"><img src={capturedPhoto} className="w-full max-h-32 object-cover" /><button type="button" onClick={retakePhoto} className="absolute top-1 right-1 bg-red-500 text-white p-1 rounded shadow-md text-[8px] font-bold"><i className="fas fa-redo"></i> Ulang</button></div>)}
                                            <canvas ref={canvasRef} style={{ display: 'none' }}></canvas>
                                        </div>
                                    </div>
                                    <button type="submit" disabled={isLoading} className="w-full bg-gray-800 text-white font-bold py-2.5 rounded-lg active:scale-95 mt-3 text-[10px] relative z-0">Buat Resi Baru</button>
                                </form>
                            </div>
                        )}

                        {}
                        {activeTab === 'histori' && (
                            <div className="animate-slide-up">
                                <h2 className="font-black text-gray-800 text-[13px] mb-2 flex items-center"><i className="fas fa-history text-emerald-500 mr-1.5"></i> Histori Tugas</h2>

                                    <div className="flex-1"><label className="text-[7px] font-bold text-gray-400 uppercase block mb-0.5">Dari Tgl</label><input type="date" value={historiStartDate} onChange={e=>setHistoriStartDate(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded p-1 text-[9px] outline-none" /></div>
                                    <div className="flex-1"><label className="text-[7px] font-bold text-gray-400 uppercase block mb-0.5">Sampai Tgl</label><input type="date" value={historiEndDate} onChange={e=>setHistoriEndDate(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded p-1 text-[9px] outline-none" /></div>
                                </div>
                                <div className="flex gap-1 mb-2 overflow-x-auto scrollbar-hide py-0.5">
                                    <button onClick={() => setHistoriStatusFilter('semua')} className={`px-2 py-1 rounded-md text-[8px] font-bold uppercase shrink-0 ${historiStatusFilter === 'semua' ? 'bg-gray-800 text-white' : 'bg-white text-gray-500 border border-gray-200'}`}>Semua</button>
                                    <button onClick={() => setHistoriStatusFilter('sukses')} className={`px-2 py-1 rounded-md text-[8px] font-bold uppercase shrink-0 ${historiStatusFilter === 'sukses' ? 'bg-emerald-500 text-white' : 'bg-white text-gray-500 border border-gray-200'}`}>Sukses</button>
                                    <button onClick={() => setHistoriStatusFilter('pending')} className={`px-2 py-1 rounded-md text-[8px] font-bold uppercase shrink-0 ${historiStatusFilter === 'pending' ? 'bg-yellow-500 text-white' : 'bg-white text-gray-500 border border-gray-200'}`}>Pending</button>
                                    <button onClick={() => setHistoriStatusFilter('cancel')} className={`px-2 py-1 rounded-md text-[8px] font-bold uppercase shrink-0 ${historiStatusFilter === 'cancel' ? 'bg-red-500 text-white' : 'bg-white text-gray-500 border border-gray-200'}`}>Cancel</button>
                                </div>
                                <div className="space-y-1.5">
                                    {historiPkgs.length === 0 ? (
                                        <div className="text-center py-6 bg-white rounded-xl border border-gray-100"><p className="text-[9px] text-gray-400 font-bold">Tidak ada riwayat.</p></div>
                                    ) : historiPkgs.map((pkg, i) => {
                                        const stat = String(pkg.status).toLowerCase();
                                        let bgBadge = 'bg-gray-100 text-gray-600';
                                        if (stat === 'sukses') bgBadge = 'bg-emerald-100 text-emerald-700';
                                        if (stat === 'pending') bgBadge = 'bg-yellow-100 text-yellow-700';
                                        if (stat === 'cancel' || stat === 'batal') bgBadge = 'bg-red-100 text-red-700';
                                        const resolvedUrlFoto = getFotoUrl(pkg.fotoBukti);
                                        return (
                                            <div key={i} className="bg-white border border-gray-100 rounded-xl py-1.5 pr-2 flex justify-between items-center shadow-sm relative overflow-hidden">
                                                <div className={`absolute left-0 top-0 bottom-0 w-1 ${stat === 'sukses' ? 'bg-emerald-500' : (stat === 'pending' ? 'bg-yellow-500' : 'bg-red-500')}`}></div>
                                                {resolvedUrlFoto ? (<img src={resolvedUrlFoto} className="w-8 h-8 rounded border border-gray-200 object-cover shrink-0 ml-2" onClick={() => setViewImage(resolvedUrlFoto)} />) : (<div className="w-8 h-8 rounded bg-gray-50 border border-gray-200 flex items-center justify-center shrink-0 ml-2"><i className="fas fa-image text-[8px] text-gray-300"></i></div>)}
                                                <div className="pl-2 flex-1 min-w-0">
                                                    <p className="font-bold text-gray-800 text-[10px] truncate">{pkg.customerName}</p>
                                                    <p className="text-[8px] text-gray-500 truncate">{pkg.packageId} • {pkg.olshopName}</p>
                                                </div>
                                                <div className="flex flex-col items-end">
                                                    <span className={`text-[7px] font-bold px-1.5 py-0.5 rounded uppercase ${bgBadge}`}>{stat === 'siap_antar' || stat === 'proses' ? 'PROSES' : stat}</span>
                                                    <span className="text-[9px] font-black text-blue-600 mt-0.5">{formatCurr(pkg.totalTagihan)}</span>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )}

                        {}
                        {activeTab === 'saldo' && (
                            <div className="animate-slide-up">
                                <h2 className="font-black text-gray-800 text-[13px] mb-2 flex items-center"><i className="fas fa-wallet text-emerald-500 mr-1.5"></i> Saldo Setoran</h2>
                                <div className="bg-white p-2 rounded-xl shadow-sm border border-gray-100 mb-3 flex items-center gap-1.5">
                                    <div className="flex-1"><label className="text-[7px] font-bold text-gray-400 uppercase block mb-0.5">Dari Tgl</label><input type="date" value={saldoStartDate} onChange={e=>setSaldoStartDate(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded p-1 text-[9px] outline-none" /></div>
                                    <div className="flex-1"><label className="text-[7px] font-bold text-gray-400 uppercase block mb-0.5">Sampai Tgl</label><input type="date" value={saldoEndDate} onChange={e=>setSaldoEndDate(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded p-1 text-[9px] outline-none" /></div>
                                </div>
                                <div className="bg-gray-800 rounded-2xl p-4 text-white shadow-md relative overflow-hidden mb-2">
                                    <div className="absolute -right-2 -bottom-2 opacity-10"><i className="fas fa-money-bill-wave text-[60px]"></i></div>
                                    <p className="text-[8px] text-gray-400 font-bold uppercase mb-0.5">WAJIB SETOR (KANTOR)</p>
                                    <h2 className={`text-2xl font-black mb-2 ${setoran < 0 ? 'text-red-400' : 'text-emerald-400'}`}>{formatCurr(setoran)}</h2>
                                    <div className="flex justify-between items-end border-t border-gray-700 pt-1.5">
                                        <div><p className="text-[7px] text-gray-400 font-bold uppercase">Total Pkt Sukses</p><p className="text-[10px] font-bold">{s_sukses} Pkt</p></div>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-2 mb-2">
                                    <div className="bg-white border border-gray-100 p-2.5 rounded-xl text-center"><p className="text-[7px] text-gray-400 font-bold uppercase mb-0.5"><i className="fas fa-hand-holding-usd text-emerald-500 mr-0.5"></i> Uang Cash</p><p className="font-black text-emerald-600 text-[11px]">{formatCurr(rincianCash)}</p></div>
                                    <div className="bg-white border border-gray-100 p-2.5 rounded-xl text-center"><p className="text-[7px] text-gray-400 font-bold uppercase mb-0.5"><i className="fas fa-wallet text-orange-500 mr-0.5"></i> Simpan (Cash)</p><p className="font-black text-orange-500 text-[11px]">{formatCurr(tambahanOngkirCash)}</p></div>
                                </div>
                                <div className="bg-white border border-gray-100 p-2.5 rounded-xl text-center"><p className="text-[7px] text-gray-400 font-bold uppercase mb-0.5"><i className="fas fa-cut text-purple-500 mr-0.5"></i> Potong TF (Hak Olshop)</p><p className="font-black text-purple-500 text-[11px]">{formatCurr(tambahanOngkirTF)}</p></div>
                            </div>
                        )}

                    </main>

                    {}
                    <nav className="absolute bottom-0 w-full glass-nav flex justify-between items-end h-[56px] z-40 border-t border-gray-100 pb-1.5 px-1">
                        <button onClick={() => setActiveTab('tugas')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'tugas' ? 'text-emerald-600' : 'text-gray-400'}`}><i className="fas fa-motorcycle text-base mb-0.5"></i><span className="text-[7px] font-bold">Antar</span></button>
                        <button onClick={() => setActiveTab('jemput')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'jemput' ? 'text-emerald-600' : 'text-gray-400'}`}><i className="fas fa-truck-pickup text-base mb-0.5"></i><span className="text-[7px] font-bold">Jemput</span></button>
                        <button onClick={() => setActiveTab('rute')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'rute' ? 'text-emerald-600' : 'text-gray-400'}`}><i className="fas fa-route text-base mb-0.5"></i><span className="text-[7px] font-bold">Rute</span></button>
                        <div className="relative -top-4 flex-shrink-0 px-1.5"><button onClick={() => setActiveTab('input')} className="w-10 h-10 bg-emerald-600 text-white rounded-full shadow-lg flex items-center justify-center text-sm border-2 border-white"><i className="fas fa-plus"></i></button></div>
                        <button onClick={() => setActiveTab('histori')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'histori' ? 'text-emerald-600' : 'text-gray-400'}`}><i className="fas fa-history text-base mb-0.5"></i><span className="text-[7px] font-bold">Histori</span></button>
                        <button onClick={() => setActiveTab('saldo')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'saldo' ? 'text-emerald-600' : 'text-gray-400'}`}><i className="fas fa-wallet text-base mb-0.5"></i><span className="text-[7px] font-bold">Saldo</span></button>
                    </nav>

                    {}
                    {isModalOpen && selectedPkg && (
                        <div className="absolute inset-0 z-50 bg-white flex flex-col animate-slide-up h-full">
                            <div className="flex items-center justify-between p-3 border-b border-gray-100 bg-white shrink-0">
                                <h3 className="font-black text-gray-800 text-[13px]">Update Pengiriman</h3>
                                <button onClick={() => setIsModalOpen(false)} className="w-6 h-6 bg-gray-100 text-gray-600 rounded-full flex items-center justify-center"><i className="fas fa-times text-[10px]"></i></button>
                            </div>
                            <div className="p-4 overflow-y-auto flex-1 bg-gray-50 pb-16">
                                <div className="bg-white p-3 rounded-xl border border-gray-100 shadow-sm mb-4 text-center">
                                    <p className="text-[8px] text-gray-400 font-bold uppercase mb-0.5">No. Resi</p>
                                    <p className="text-sm font-mono font-black text-emerald-600">{selectedPkg.packageId}</p>
                                </div>
                                <form onSubmit={handleUpdateStatus} className="space-y-3">
                                    <div>
                                        <label className="block text-[10px] font-bold text-gray-600 mb-1 ml-1">Status Final</label>
                                        <select name="status" value={updateStatusVal} onChange={(e) => setUpdateStatusVal(e.target.value)} className="w-full p-2.5 bg-white border border-gray-200 rounded-xl text-[11px] font-bold outline-none focus:border-emerald-500">
                                            <option value="SUKSES">✅ Sukses Terkirim</option>
                                            <option value="SIAP_ANTAR">🚚 Siap Antar (Proses)</option>
                                            <option value="PENDING">⏱️ Pending</option>
                                            <option value="CANCEL">❌ Cancel</option>
                                        </select>
                                    </div>
                                    
                                    {/* MUNCUL OTOMATIS JIKA STATUS == SUKSES */}
                                    {updateStatusVal === 'SUKSES' && (
                                        <div className="animate-slide-up bg-emerald-50 p-3 rounded-xl border border-emerald-200">
                                            <label className="block text-[10px] font-bold text-emerald-800 mb-1 ml-1">Konfirmasi Metode Bayar</label>
                                            <select name="metodeBayarUpdate" defaultValue={selectedPkg.metodeBayar} className="w-full p-2.5 bg-white border border-emerald-300 text-emerald-900 rounded-lg text-[11px] font-bold outline-none focus:border-emerald-600">
                                                <option value="CASH">CASH (TUNAI)</option>
                                                <option value="TF OLSHOP">TF OLSHOP</option>
                                                <option value="COD">COD</option>
                                                <option value="TF KANTOR">TF KANTOR</option>
                                            </select>
                                        </div>
                                    )}

                                    <div>
                                        <label className="block text-[10px] font-bold text-gray-600 mb-1 ml-1">Catatan</label>
                                        <input type="text" name="keterangan" placeholder="Ketik alasan jika gagal..." className="w-full p-2.5 bg-white border border-gray-200 rounded-xl text-[11px] outline-none focus:border-emerald-500" />
                                    </div>
                                    
                                    {/* AKSES KAMERA LANGSUNG SIMPAN KE G-DRIVE VIA SERVER */}
                                    <div>
                                        <label className="block text-[10px] font-bold text-gray-600 mb-1 ml-1">Foto Bukti Pengiriman</label>
                                        <div className="border border-dashed border-gray-300 rounded-xl overflow-hidden bg-white">
                                            {!cameraStream && !capturedPhoto && (
                                                <button type="button" onClick={startCamera} className="w-full py-6 text-gray-500 flex flex-col items-center">
                                                    <i className="fas fa-camera text-emerald-500 text-lg mb-1"></i><span className="text-[9px] font-bold">Ambil Foto Bukti</span>
                                                </button>
                                            )}
                                            <div className={`relative ${cameraStream && !capturedPhoto ? 'block' : 'hidden'}`}>
                                                <video ref={videoRef} autoPlay playsInline className="w-full max-h-48 object-cover"></video>
                                                <div className="absolute bottom-0 w-full p-2 bg-gradient-to-t from-black/60 flex justify-center"><button type="button" onClick={takePhoto} className="w-10 h-10 bg-white rounded-full border-2 border-gray-300 shadow-lg flex items-center justify-center"><div className="w-8 h-8 border border-gray-800 rounded-full"></div></button></div>
                                            </div>
                                            {capturedPhoto && (
                                                <div className="relative">
                                                    <img src={capturedPhoto} className="w-full max-h-48 object-cover" />
                                                    <button type="button" onClick={retakePhoto} className="absolute top-2 right-2 bg-red-500/90 text-white px-2 py-1 rounded shadow-md text-[9px] font-bold"><i className="fas fa-redo mr-1"></i> Ulang</button>
                                                </div>
                                            )}
                                            <canvas ref={canvasRef} style={{ display: 'none' }}></canvas>
                                        </div>
                                    </div>
                                    <button type="submit" disabled={isLoading} className="w-full bg-gray-900 text-white font-black py-3 rounded-xl shadow-md active:scale-95 text-[11px] uppercase mt-2">Simpan Perubahan</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {viewImage && (
                        <div className="absolute inset-0 z-[999] bg-black/90 flex flex-col items-center justify-center p-4 backdrop-blur-sm" onClick={() => setViewImage(null)}>
                            <button onClick={() => setViewImage(null)} className="absolute top-4 right-4 w-8 h-8 bg-white/20 rounded-full flex items-center justify-center text-white"><i className="fas fa-times text-sm"></i></button>
                            <img src={viewImage} className="max-w-full max-h-[80vh] rounded-xl object-contain border border-white/10" />
                        </div>
                    )}

                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
