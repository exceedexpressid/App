<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kurir App - Exceed Express</title>
    
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>

    <style>
        /* MENGECILKAN SELURUH TAMPILAN SEBESAR 25% SECARA PROPORSIONAL */
        html { font-size: 12px; } 

        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; touch-action: manipulation; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        
        @keyframes fadeInDown { 0% { opacity: 0; transform: translateY(-10px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-down { animation: fadeInDown 0.3s ease-out forwards; }
    </style>
</head>
<body class="antialiased flex justify-center bg-gray-900">
    <div id="root" class="w-full max-w-[450px] bg-slate-900 shadow-2xl h-[100dvh] overflow-hidden flex flex-col relative border-x border-slate-800"></div>

    <script type="text/babel" data-presets="env,react">
        /** @jsx React.createElement */
        /** @jsxFrag React.Fragment */
        
        const { useState, useEffect, useRef, useMemo } = React;

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVHojspm17WSZU42RaMtgiNWJikRfGyTlPh1FczlDJS9JL52PxX0d9RpkNJYM4g424/exec";
        const APPSHEET_APP_ID = "APLIKASEXCEED-327461285";

        const formatCurr = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num || 0);
        const formatWA = (phone) => {
            if(!phone) return ''; let p = String(phone).replace(/\D/g, '');
            if(p.startsWith('0')) p = '62' + p.substring(1); return p;
        };

        const getFotoUrl = (fileKey) => {
            if (!fileKey || String(fileKey).trim() === '') return null;
            if (String(fileKey).startsWith('http://') || String(fileKey).startsWith('https://')) return fileKey;
            return `https://www.appsheet.com/template/gettablefileurl?appName=${APPSHEET_APP_ID}&tableName=InputPaket&fileName=${encodeURIComponent(fileKey)}`;
        };

        const getFinancials = (pkg) => {
            const hBarang = Number(pkg.hargaPaket) || 0; const tagihan = Number(pkg.totalTagihan) || 0; const selisihTagihan = tagihan - hBarang > 0 ? tagihan - hBarang : 0;
            let oTambahan = Number(pkg.tambahanOngkir) || 0; let oDasar = Number(pkg.ongkirDasar) || 0;
            if (oTambahan === 0 && oDasar > 0 && selisihTagihan > oDasar) oTambahan = selisihTagihan - oDasar;
            else if (oTambahan === 0 && oDasar === 0 && selisihTagihan > 0) oDasar = selisihTagihan;
            if (oDasar === 0 && oTambahan > 0 && selisihTagihan > oTambahan) oDasar = selisihTagihan - oTambahan;
            return { hBarang, tagihan, oDasar, oTambahan, oTotal: oDasar + oTambahan };
        };

        function App() {
            const [kurirId, setKurirId] = useState(localStorage.getItem('ex_kurirId') || '');
            const [kurirName, setKurirName] = useState(localStorage.getItem('ex_kurirName') || '');
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('ex_kurirId'));
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            
            const [activeTab, setActiveTab] = useState('tugas'); 
            const [tugasViewMode, setTugasViewMode] = useState('standard'); 
            const [isLoading, setIsLoading] = useState(false);
            const [loadingMessage, setLoadingMessage] = useState('');
            
            const [packages, setPackages] = useState([]);
            const [masterOlshops, setMasterOlshops] = useState([]);
            const [masterZonas, setMasterZonas] = useState([]);
            const [jemputans, setJemputans] = useState([]);
            
            const [routeOrder, setRouteOrder] = useState(() => JSON.parse(localStorage.getItem('ex_gojek_routeOrder') || '[]'));
            const [routeItems, setRouteItems] = useState([]); 
            const [draggedItemIndex, setDraggedItemIndex] = useState(null);

            const [searchQuery, setSearchQuery] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedPkg, setSelectedPkg] = useState(null);
            
            const [detailPkg, setDetailPkg] = useState(null); 
            
            const [historiStatusFilter, setHistoriStatusFilter] = useState('semua');
            const [historiStartDate, setHistoriStartDate] = useState('');
            const [historiEndDate, setHistoriEndDate] = useState('');
            const [searchHistori, setSearchHistori] = useState('');

            const [rekapOlshopSearch, setRekapOlshopSearch] = useState('');
            const [rekapStartDate, setRekapStartDate] = useState('');
            const [rekapEndDate, setRekapEndDate] = useState('');
            
            const [saldoStartDate, setSaldoStartDate] = useState(new Date().toISOString().split('T')[0]);
            const [saldoEndDate, setSaldoEndDate] = useState(new Date().toISOString().split('T')[0]);
            
            const [updateStatusVal, setUpdateStatusVal] = useState(''); 
            const [inputOlshopSearch, setInputOlshopSearch] = useState('');
            const [showOlshopDropdown, setShowOlshopDropdown] = useState(false);
            const [valHarga, setValHarga] = useState('');
            const [valTambahan, setValTambahan] = useState('');
            const [inputFormStatus, setInputFormStatus] = useState('Siap Antar');

            const [currentLocation, setCurrentLocation] = useState('');

            const [inputJemputOlshop, setInputJemputOlshop] = useState('');
            const [inputJemputAddress, setInputJemputAddress] = useState('');
            const [inputJemputHp, setInputJemputHp] = useState('');
            const [inputJemputEstimasi, setInputJemputEstimasi] = useState('');
            const [showJemputOlshopDropdown, setShowJemputOlshopDropdown] = useState(false);

            const [searchJemput, setSearchJemput] = useState('');
            const [jemputStartDate, setJemputStartDate] = useState('');
            const [jemputEndDate, setJemputEndDate] = useState('');

            const [cameraStream, setCameraStream] = useState(null);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [capturedPhoto, setCapturedPhoto] = useState(null);
            const [isCameraFullScreen, setIsCameraFullScreen] = useState(false);

            const [isEditAdminModalOpen, setIsEditAdminModalOpen] = useState(false);
            const [editAdminData, setEditAdminData] = useState({ packageId: '', customerName: '', customerPhone: '', olshopName: '' });

            const isMasterKurir = kurirId === 'exceedexpress.id@gmail.com';

            useEffect(() => {
                const handleOnline = () => setIsOffline(false);
                const handleOffline = () => setIsOffline(true);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            const getLocation = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => setCurrentLocation(`${pos.coords.latitude}, ${pos.coords.longitude}`),
                        (err) => console.log("Gagal akses GPS")
                    );
                }
            };

            const loadData = async (forceLoginId = null) => {
                setIsLoading(true); setLoadingMessage('Menyinkronkan Data...');
                getLocation();
                const currentId = forceLoginId || kurirId;
                const cName = forceLoginId === 'exceedexpress.id@gmail.com' ? 'Exceed Express' : kurirName;

                try {
                    const res = await fetch(`${SCRIPT_URL}?action=getInitData&t=${new Date().getTime()}`);
                    const data = await res.json();
                    if(data.status === 'success') {
                        // SAVE BACKUP KE OFFLINE STORAGE
                        localStorage.setItem('ex_offline_backup_data', JSON.stringify(data.data));
                        setIsOffline(false);

                        setMasterOlshops(data.data.olshop || []); 
                        setMasterZonas(data.data.zona || []);
                        
                        if (currentId) {
                            const isMaster = currentId === 'exceedexpress.id@gmail.com';
                            const myPkgs = data.data.packages.filter(p => isMaster || String(p.kurirEmailAsli).toLowerCase() === currentId.toLowerCase() || String(p.kurirId).toLowerCase() === currentId.toLowerCase());
                            setPackages(myPkgs.reverse());

                            const myJemputans = (data.data.jemputan || []).filter(j => {
                                if (isMaster) return true;
                                const stat = String(j.status).toLowerCase();
                                const kId = String(j.kurirId).toLowerCase();
                                return stat === 'menunggu' || stat.trim() === '' || kId === currentId.toLowerCase() || kId === cName.toLowerCase();
                            });
                            setJemputans(myJemputans.reverse());
                        }
                    }
                } catch(e) { 
                    // JIKA GAGAL KONEKSI, GUNAKAN DATA OFFLINE
                    setIsOffline(true);
                    const backupDataStr = localStorage.getItem('ex_offline_backup_data');
                    if(backupDataStr) {
                        const backupData = JSON.parse(backupDataStr);
                        setMasterOlshops(backupData.olshop || []); 
                        setMasterZonas(backupData.zona || []);
                        if (currentId) {
                            const isMaster = currentId === 'exceedexpress.id@gmail.com';
                            const myPkgs = backupData.packages.filter(p => isMaster || String(p.kurirEmailAsli).toLowerCase() === currentId.toLowerCase() || String(p.kurirId).toLowerCase() === currentId.toLowerCase());
                            setPackages(myPkgs.reverse());

                            const myJemputans = (backupData.jemputan || []).filter(j => {
                                if (isMaster) return true;
                                const stat = String(j.status).toLowerCase();
                                const kId = String(j.kurirId).toLowerCase();
                                return stat === 'menunggu' || stat.trim() === '' || kId === currentId.toLowerCase() || kId === cName.toLowerCase();
                            });
                            setJemputans(myJemputans.reverse());
                        }
                        alert("Anda sedang Offline. Menampilkan data cadangan terakhir.");
                    } else {
                        alert("Koneksi terputus dan tidak ada data cadangan."); 
                    }
                }
                setIsLoading(false);
            };

            useEffect(() => { if (isLoggedIn) loadData(); }, [isLoggedIn]);

            const handleLogin = async (e) => {
                e.preventDefault();
                const inputId = e.target.kodeUser.value.trim().toLowerCase();
                const inputPass = e.target.password.value.trim(); 
                
                if (inputId === 'exceedexpress.id@gmail.com' && inputPass === 'adminexceed') {
                    localStorage.setItem('ex_kurirId', inputId); localStorage.setItem('ex_kurirName', 'Exceed Express'); 
                    setKurirId(inputId); setKurirName('Exceed Express'); setIsLoggedIn(true); loadData(inputId); return;
                }
                
                setIsLoading(true); setLoadingMessage('Memverifikasi...');
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=getInitData`);
                    const data = await res.json();
                    if(data.status === 'success') {
                        const validKurir = (data.data.kurir || []).find(k => String(k.id).toLowerCase() === inputId);
                        if (validKurir) {
                            localStorage.setItem('ex_kurirId', validKurir.id); localStorage.setItem('ex_kurirName', validKurir.nama);
                            setKurirId(validKurir.id); setKurirName(validKurir.nama); setIsLoggedIn(true); loadData(validKurir.id);
                        } else { alert("ID Kurir salah atau tidak terdaftar."); }
                    }
                } catch (e) { alert("Gagal verifikasi. Cek koneksi."); }
                setIsLoading(false);
            };

            const handleLogout = () => {
                if(window.confirm("Keluar dari aplikasi?")) {
                    localStorage.removeItem('ex_kurirId'); localStorage.removeItem('ex_kurirName'); 
                    setIsLoggedIn(false); setPackages([]); setJemputans([]);
                }
            };

            const tugasAktif = useMemo(() => {
                let aktif = packages.filter(p => { 
                    const s = String(p.status).toUpperCase().replace('_', ' '); 
                    return s === 'PROSES' || s === 'SIAP ANTAR' || s === 'PENDING'; 
                });
                if(searchQuery) {
                    const q = searchQuery.toLowerCase();
                    aktif = aktif.filter(p => 
                        String(p.customerName).toLowerCase().includes(q) || 
                        String(p.packageId).toLowerCase().includes(q) ||
                        String(p.customerPhone).toLowerCase().includes(q) ||
                        String(p.olshopName).toLowerCase().includes(q) ||
                        String(p.kurirId).toLowerCase().includes(q) ||
                        String(p.kurirEmailAsli).toLowerCase().includes(q)
                    );
                }
                return aktif.sort((a, b) => {
                    const isPendingA = String(a.status).toUpperCase() === 'PENDING'; const isPendingB = String(b.status).toUpperCase() === 'PENDING';
                    if (isPendingA && !isPendingB) return 1; if (!isPendingA && isPendingB) return -1; 
                    const posA = routeOrder.indexOf(a.packageId) !== -1 ? routeOrder.indexOf(a.packageId) : 99999;
                    const posB = routeOrder.indexOf(b.packageId) !== -1 ? routeOrder.indexOf(b.packageId) : 99999;
                    return posA - posB;
                });
            }, [packages, routeOrder, searchQuery]);

            const filteredJemputans = useMemo(() => {
                let list = jemputans;
                if (searchJemput) {
                    const q = searchJemput.toLowerCase();
                    list = list.filter(j => 
                        String(j.olshopName).toLowerCase().includes(q) || 
                        String(j.address).toLowerCase().includes(q) ||
                        String(j.kurirId).toLowerCase().includes(q)
                    );
                }
                if (jemputStartDate || jemputEndDate) {
                    list = list.filter(j => {
                        let pDateStr = j.tanggal || j.dateString || '';
                        if (!pDateStr) return true;
                        let normalizedDateStr = "";
                        try {
                            let d = new Date(pDateStr);
                            if (!isNaN(d.getTime())) {
                                normalizedDateStr = d.toISOString().split('T')[0];
                            } else {
                                normalizedDateStr = pDateStr.split('T')[0];
                            }
                        } catch(e) {
                            normalizedDateStr = pDateStr.split('T')[0];
                        }
                        const sD = jemputStartDate || "2000-01-01";
                        const eD = jemputEndDate || "2100-01-01";
                        return normalizedDateStr >= sD && normalizedDateStr <= eD;
                    });
                }
                return list;
            }, [jemputans, searchJemput, jemputStartDate, jemputEndDate]);

            useEffect(() => {
                if (activeTab === 'rute') {
                    const rItems = packages.filter(p => { 
                        const s = String(p.status).toUpperCase().replace('_', ' '); 
                        return s === 'PROSES' || s === 'SIAP ANTAR' || s === 'PENDING'; 
                    });
                    rItems.sort((a, b) => {
                        const posA = routeOrder.indexOf(a.packageId) !== -1 ? routeOrder.indexOf(a.packageId) : 99999;
                        const posB = routeOrder.indexOf(b.packageId) !== -1 ? routeOrder.indexOf(b.packageId) : 99999;
                        return posA - posB;
                    });
                    setRouteItems(rItems);
                }
            }, [activeTab, packages, routeOrder]);

            const moveRouteUp = (index) => { if (index === 0) return; const newItems = [...routeItems]; [newItems[index - 1], newItems[index]] = [newItems[index], newItems[index - 1]]; setRouteItems(newItems); };
            const moveRouteDown = (index) => { if (index === routeItems.length - 1) return; const newItems = [...routeItems]; [newItems[index + 1], newItems[index]] = [newItems[index], newItems[index + 1]]; setRouteItems(newItems); };
            const handleDragStart = (e, index) => { setDraggedItemIndex(index); e.dataTransfer.effectAllowed = 'move'; };
            const handleDragOver = (e, index) => { e.preventDefault(); if (draggedItemIndex === null || draggedItemIndex === index) return; const newItems = [...routeItems]; const draggedItem = newItems[draggedItemIndex]; newItems.splice(draggedItemIndex, 1); newItems.splice(index, 0, draggedItem); setDraggedItemIndex(index); setRouteItems(newItems); };
            const handleDragEnd = () => { setDraggedItemIndex(null); };
            const saveRoute = () => {
                const newOrder = routeItems.map(p => p.packageId);
                setRouteOrder(newOrder); localStorage.setItem('ex_gojek_routeOrder', JSON.stringify(newOrder));
                alert("Rute tersimpan."); setActiveTab('tugas');
            };

            const startCamera = async () => { 
                try { 
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }); 
                    setCameraStream(stream); 
                    setIsCameraFullScreen(true); 
                } 
                catch (err) { alert("Izin kamera ditolak. Pastikan izinkan akses kamera di pengaturan browser."); } 
            };
            const stopCamera = () => { 
                if (cameraStream) { 
                    cameraStream.getTracks().forEach(track => track.stop()); 
                    setCameraStream(null); 
                } 
                setIsCameraFullScreen(false); 
            };
            const takePhoto = () => { 
                if (videoRef.current && canvasRef.current) { 
                    const video = videoRef.current; const canvas = canvasRef.current; 
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight; 
                    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height); 
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.6); 
                    setCapturedPhoto(dataUrl); 
                    stopCamera(); 
                    try {
                        const link = document.createElement('a'); 
                        link.href = dataUrl; 
                        link.download = `Paket_${new Date().getTime()}.jpg`; 
                        document.body.appendChild(link); 
                        link.click(); 
                        document.body.removeChild(link);
                    } catch(e) {}
                } 
            };
            const retakePhoto = () => { setCapturedPhoto(null); startCamera(); };

            const videoCallbackRef = (node) => {
                videoRef.current = node;
                if (node && cameraStream) {
                    node.srcObject = cameraStream;
                    node.setAttribute('playsinline', true);
                    node.muted = true;
                    node.play().catch(e => console.error("Kamera ditahan browser:", e));
                }
            };

            useEffect(() => { if (activeTab !== 'input' && isCameraFullScreen) stopCamera(); }, [activeTab, isCameraFullScreen]);

            const handleTambahJemput = async (e) => {
                e.preventDefault();
                if (isOffline) return alert("Anda sedang offline. Tidak bisa menambah jemputan.");
                if (!inputJemputOlshop || !inputJemputAddress) return alert("Pilih Olshop dan isi Alamat!");
                setIsLoading(true); setLoadingMessage('Menambah Jemputan...');
                try {
                    const formData = new URLSearchParams(); 
                    formData.append('action', 'tambahJemput'); 
                    formData.append('olshopName', inputJemputOlshop); 
                    formData.append('address', inputJemputAddress);
                    formData.append('hpOlshop', inputJemputHp);
                    formData.append('estimasiPaket', inputJemputEstimasi);
                    
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
                    const result = await response.json();
                    if (result.status === 'success') { 
                        alert("Berhasil menambah tugas jemputan!"); 
                        setInputJemputOlshop(''); setInputJemputAddress(''); setInputJemputHp(''); setInputJemputEstimasi(''); setShowJemputOlshopDropdown(false);
                        loadData(); 
                    } else { alert("Gagal: " + result.message); }
                } catch (error) { alert("Error jaringan."); } finally { setIsLoading(false); }
            };

            const handleAmbilJemputan = async (idJemput) => {
                if (isOffline) return alert("Offline. Harap cari sinyal untuk mengambil jemputan.");
                if(!window.confirm("Ambil tugas jemputan ini?")) return;
                setIsLoading(true); setLoadingMessage('Mengambil Tugas...');
                try {
                    const formData = new URLSearchParams(); formData.append('action', 'ambilJemputan'); formData.append('idJemput', idJemput); formData.append('kurirId', kurirId); formData.append('kurirNama', kurirName);
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
                    const result = await response.json();
                    if (result.status === 'success') { alert("Berhasil! Tugas ini sekarang milik Anda."); loadData(); } else { alert("Gagal: " + result.message); }
                } catch (error) { alert("Error jaringan."); } finally { setIsLoading(false); }
            };

            const handleSelesaiJemputan = async (idJemput) => {
                if (isOffline) return alert("Offline. Harap cari sinyal untuk selesaikan jemputan.");
                if(!window.confirm("Tandai jemputan selesai?")) return;
                setIsLoading(true); setLoadingMessage('Menyelesaikan Tugas...');
                try {
                    const formData = new URLSearchParams(); formData.append('action', 'selesaiJemputan'); formData.append('idJemput', idJemput);
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
                    const result = await response.json();
                    if (result.status === 'success') { alert("Jemputan Selesai!"); loadData(); } else { alert("Gagal: " + result.message); }
                } catch (error) { alert("Error jaringan."); } finally { setIsLoading(false); }
            };

            const openUpdateModal = (pkg, e) => {
                e.stopPropagation(); 
                setSelectedPkg(pkg); 
                const stat = String(pkg.status).toUpperCase().replace('_', ' ');
                setUpdateStatusVal(stat === 'PROSES' || stat === 'SIAP ANTAR' ? 'SUKSES' : stat); 
                setIsModalOpen(true);
            };

            const handleUpdateStatus = async (e) => {
                e.preventDefault(); 
                if (isOffline) return alert("Offline. Harap sambungkan ke internet untuk update status.");
                getLocation();
                const nStatus = e.target.status.value; const nKet = e.target.keterangan ? e.target.keterangan.value : ""; const nMetode = e.target.metodeBayarUpdate ? e.target.metodeBayarUpdate.value : "";

                setIsLoading(true); setLoadingMessage('Menyimpan Status...');
                try {
                    const formData = new URLSearchParams(); formData.append('action', 'updateStatus'); formData.append('packageId', selectedPkg.packageId); formData.append('status', nStatus); formData.append('keterangan', nKet);
                    if (nMetode !== "") formData.append('metodeBayar', nMetode);
                    if (currentLocation) formData.append('titikLokasi', currentLocation);
                    
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
                    const result = await response.json();
                    if (result.status === 'success') { alert("Berhasil diupdate!"); setIsModalOpen(false); loadData(); } else { alert("Gagal: " + result.message); }
                } catch (error) { alert("Error jaringan."); } finally { setIsLoading(false); }
            };

            const openEditAdminModal = (pkg) => {
                setEditAdminData({
                    packageId: pkg.packageId,
                    customerName: pkg.customerName || '',
                    customerPhone: pkg.customerPhone || '',
                    olshopName: pkg.olshopName || ''
                });
                setIsEditAdminModalOpen(true);
            };

            const handleEditAdminSubmit = async (e) => {
                e.preventDefault();
                if (isOffline) return alert("Offline. Tidak bisa edit data.");
                setIsLoading(true); setLoadingMessage('Menyimpan Perubahan...');
                try {
                    const formData = new URLSearchParams();
                    formData.append('action', 'editDataAdmin');
                    formData.append('packageId', editAdminData.packageId);
                    formData.append('customerName', editAdminData.customerName);
                    formData.append('customerPhone', editAdminData.customerPhone);
                    formData.append('olshopName', editAdminData.olshopName);
                    
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
                    const result = await response.json();
                    if (result.status === 'success') {

                    } else { alert("Gagal: " + result.message); }

            const historiPkgs = useMemo(() => {
                let hPkgs = packages.filter(p => {

                    if (historiStatusFilter === 'cancel') return s === 'CANCEL' || s === 'BATAL';
                    return s === historiStatusFilter.toUpperCase().replace('_', ' ');
                });
                if (historiStartDate || historiEndDate) {
                   hPkgs = hPkgs.filter(p => {
                      let pDateStr = p.dateString || p.tanggalInput || p.tanggal || '';
                      if (!pDateStr) return false; let normalizedDateStr = "";
                      try {

                          if (isNaN(d.getTime()) && pDateStr.includes('/')) { const parts = pDateStr.split('/'); if (parts.length === 3) d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); }

                    else if (stat === 'CANCEL' || stat === 'BATAL') r_cancel++;
                    else r_proses++;

                    if (stat === 'SUKSES') {
                        const olName = pkg.olshopName || 'Tanpa Nama';
                        if (!groups[olName]) groups[olName] = { name: olName, qty: 0, cash: 0, tf: 0, totalPencairan: 0 };

                        const { hBarang, oDasar, oTambahan, oTotal } = getFinancials(pkg);
                        const metode = String(pkg.metodeBayar).trim().toUpperCase();
                        
                        if (metode === 'CASH' || metode === 'TF KANTOR' || metode === 'COD') {
                            groups[olName].cash += hBarang;

                        } else if (metode === 'TF OLSHOP') {
                            groups[olName].tf += oTotal;
                            groups[olName].totalPencairan -= oTotal;
                        }
                    }

                if (rekapOlshopSearch) {

                    resultArr = resultArr.filter(r => r.name.toLowerCase().includes(sq));
                }
                resultArr.sort((a,b) => b.qty - a.qty);
                
                return { list: resultArr, stats: { r_sukses, r_proses, r_pending, r_cancel } };

                                    <div>
                                        <h3 className="font-bold text-blue-300 text-sm mb-1">Tugas Jemputan</h3>
                                        <p className="text-xs text-blue-400/80 leading-snug">Daftar toko yang minta dipickup. Cepat ambil sebelum keduluan kurir lain!</p>
                                    </div>
                                </div>

                                {isMasterKurir && (
                                    <form onSubmit={handleTambahJemput} className="bg-slate-800 border border-emerald-500/30 p-4 rounded-3xl mb-5 shadow-lg relative">
                                        <h3 className="font-black text-emerald-400 text-xs mb-3 uppercase tracking-widest"><i className="fas fa-plus-circle mr-1.5"></i> Admin: Buat Tugas Jemput</h3>
                                        <div className="space-y-3">
                                            <div className="relative">
                                                <input type="text" value={inputJemputOlshop} onChange={(e) => { setInputJemputOlshop(e.target.value); setShowJemputOlshopDropdown(true); }} onFocus={() => setShowJemputOlshopDropdown(true)} placeholder="Ketik Nama Olshop..." className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs text-white outline-none focus:border-emerald-500 transition-colors" required />
                                                {showJemputOlshopDropdown && (
                                                    <React.Fragment>
                                                        <div className="fixed inset-0 z-40" onClick={() => setShowJemputOlshopDropdown(false)}></div>
                                                        <ul className="absolute z-50 w-full mt-1 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl max-h-48 overflow-y-auto custom-scrollbar">
                                                            {masterOlshops.filter(o => o.nama.toLowerCase().includes(inputJemputOlshop.toLowerCase())).map((o, i) => (
                                                                <li key={i} onClick={() => { 
                                                                    setInputJemputOlshop(o.nama); 
                                                                    setInputJemputAddress(o.alamat); 
                                                                    setInputJemputHp(o.phone || '');
                                                                    setShowJemputOlshopDropdown(false); 
                                                                }} className="p-3 text-xs hover:bg-emerald-900/30 cursor-pointer border-b border-slate-700/50 font-bold text-slate-200">{o.nama}</li>
                                                            ))}
                                                        </ul>
                                                    </React.Fragment>
                                                )}
                                            </div>
                                            <textarea value={inputJemputAddress} onChange={(e) => setInputJemputAddress(e.target.value)} placeholder="Alamat Jemputan..." rows="2" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs text-white outline-none focus:border-emerald-500 transition-colors resize-none" required></textarea>
                                            <div className="flex gap-2">
                                                <input type="text" value={inputJemputEstimasi} onChange={(e) => setInputJemputEstimasi(e.target.value)} placeholder="Estimasi Pkt (Opsional)" className="w-1/3 bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs text-white outline-none focus:border-emerald-500 transition-colors" />
                                                <input type="text" value={inputJemputHp} onChange={(e) => setInputJemputHp(e.target.value)} placeholder="No HP Olshop" className="w-2/3 bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs text-white outline-none focus:border-emerald-500 transition-colors" />
                                            </div>
                                            <button type="submit" disabled={isLoading} className="w-full bg-emerald-600 text-white font-black text-xs py-3 rounded-xl shadow-lg shadow-emerald-900/30 active:scale-95 transition-transform uppercase tracking-widest">Tambah Jemputan</button>
                                        </div>
                                    </form>
                                )}

                                <div className="mb-3 relative">
                                    <i className="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500 text-sm"></i>
                                    <input type="text" placeholder="Cari nama olshop, alamat, kurir..." value={searchJemput} onChange={(e) => setSearchJemput(e.target.value)} className="w-full pl-10 pr-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-xs outline-none focus:border-blue-500 text-white placeholder-slate-500 transition-colors shadow-sm" />
                                </div>
                                <div className="bg-slate-800 p-3 rounded-xl shadow-sm border border-slate-700 mb-4 flex items-center gap-2">
                                    <div className="flex-1 relative">
                                        <i className="far fa-calendar-alt absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500 text-[10px]"></i>
                                        <input type="date" value={jemputStartDate} onChange={e=>setJemputStartDate(e.target.value)} className="w-full pl-8 pr-2 py-2 bg-slate-900 border border-slate-600 rounded-lg text-[10px] outline-none focus:border-blue-500 text-slate-300 font-bold" />
                                    </div>
                                    <span className="text-[10px] font-bold text-slate-500">s/d</span>
                                    <div className="flex-1 relative">
                                        <i className="far fa-calendar-alt absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500 text-[10px]"></i>
                                        <input type="date" value={jemputEndDate} onChange={e=>setJemputEndDate(e.target.value)} className="w-full pl-8 pr-2 py-2 bg-slate-900 border border-slate-600 rounded-lg text-[10px] outline-none focus:border-blue-500 text-slate-300 font-bold" />
                                    </div>
                                </div>

                                {filteredJemputans.length === 0 ? (
                                    <div className="text-center py-12 text-slate-500 bg-slate-800/50 rounded-3xl border border-dashed border-slate-700"><p className="text-xs font-bold">Belum ada request jemputan.</p></div>
                                ) : (
                                    <div className="space-y-3">
                                        {filteredJemputans.map((jpt, i) => {
                                            const isMenunggu = String(jpt.status).toLowerCase() === 'menunggu' || !jpt.status;
                                            const isSelesai = String(jpt.status).toLowerCase() === 'selesai';
                                            const isMilikSaya = String(jpt.kurirId).toLowerCase() === kurirName.toLowerCase() || String(jpt.kurirId).toLowerCase() === kurirId.toLowerCase();
                                            const hp = jpt.hpOlshop || (masterOlshops.find(o => String(o.nama).toLowerCase() === String(jpt.olshopName).toLowerCase())?.phone || '');
                                            const waLinkJemput = hp ? `https://wa.me/${formatWA(hp)}?text=${encodeURIComponent(`Halo kaka, saya kurir dari Exceed Express, mau jemput paketnya. Mohon dibantu share lokasi atau detail alamat agar mempermudah proses penjemputan. Terima Kasih`)}` : null;

                                            return (
                                                <div key={i} className={`bg-slate-800 border ${isSelesai ? 'border-emerald-500/30' : isMilikSaya ? 'border-orange-500/50 shadow-orange-900/20' : 'border-slate-700'} rounded-2xl p-3 shadow-lg flex flex-col gap-2`}>
                                                    <div className="flex justify-between items-center">
                                                        <div className="flex items-center gap-2 truncate">
                                                            <i className={`fas fa-store ${isSelesai ? 'text-emerald-400' : 'text-orange-400'}`}></i>
                                                            <span className="font-bold text-white text-sm truncate">{jpt.olshopName}</span>
                                                        </div>
                                                        <span className={`text-[8px] font-bold px-2 py-1 rounded uppercase tracking-widest ${isSelesai ? 'bg-emerald-900/30 text-emerald-400 border border-emerald-800/50' : isMenunggu ? 'bg-orange-900/30 text-orange-400 border border-orange-800/50' : 'bg-blue-900/30 text-blue-400 border border-blue-800/50'}`}>{isSelesai ? 'SELESAI' : isMenunggu ? 'TERSEDIA' : 'DIAMBIL'}</span>
                                                    </div>
                                                    <div className="flex justify-between items-start gap-2">
                                                        <div className="flex-1 min-w-0">
                                                            <p className={`text-[10px] ${isSelesai ? 'text-slate-500' : 'text-slate-400'} leading-snug line-clamp-2 mb-1`}><i className="fas fa-map-marker-alt text-blue-400 mr-1"></i> {jpt.address}</p>
                                                            {jpt.estimasiPaket && <p className={`text-[9px] ${isSelesai ? 'text-emerald-400/70' : 'text-orange-400'} font-bold`}><i className="fas fa-box mr-1"></i>Est: {jpt.estimasiPaket} Pkt</p>}
                                                        </div>
                                                        <div className="shrink-0 flex flex-col gap-1 items-end">
                                                            {hp && !isSelesai && <a href={waLinkJemput} target="_blank" className="bg-emerald-900/30 text-emerald-400 px-3 py-1.5 rounded-lg border border-emerald-800/50 text-[10px] font-bold flex items-center"><i className="fab fa-whatsapp mr-1.5 text-sm"></i>Hubungi</a>}
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="mt-1 pt-2 border-t border-slate-700 flex gap-2">
                                                        {isSelesai ? (
                                                            <div className="w-full bg-emerald-900/20 text-emerald-500 font-bold text-[10px] py-2 rounded-xl text-center border border-emerald-800/30 uppercase tracking-widest flex items-center justify-center">
                                                                <i className="fas fa-check-circle mr-1.5"></i> Jemputan Selesai
                                                            </div>
                                                        ) : isMenunggu ? (
                                                            <button onClick={() => handleAmbilJemputan(jpt.idJemput)} className="w-full bg-blue-600 text-white font-black text-[10px] py-2 rounded-xl shadow-lg shadow-blue-900/30 active:scale-95 transition-transform uppercase tracking-widest">Ambil Tugas</button>
                                                        ) : isMilikSaya ? (
                                                            <button onClick={() => handleSelesaiJemputan(jpt.idJemput)} className="w-full bg-orange-600 text-white font-black text-[10px] py-2 rounded-xl shadow-lg shadow-orange-900/30 active:scale-95 transition-transform uppercase tracking-widest">Selesaikan Pickup</button>
                                                        ) : (
                                                            <div className="w-full bg-slate-900 text-slate-500 font-bold text-[10px] py-2 rounded-xl text-center border border-slate-800 uppercase tracking-widest">Dijemput oleh {jpt.kurirId || 'Kurir Lain'}</div>
                                                        )}
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* TAB RUTE */}
                        {activeTab === 'rute' && (
                            <div className="animate-fade-in-down px-1">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="font-black text-white text-lg flex items-center"><i className="fas fa-route text-emerald-400 mr-2"></i> Susun Rute</h2>
                                    <button onClick={saveRoute} className="bg-emerald-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg shadow-emerald-900/30 active:scale-95 transition-transform uppercase tracking-widest">Submit Rute</button>
                                </div>

                                {routeItems.length === 0 ? (
                                    <div className="text-center py-12 text-slate-500 bg-slate-800/50 rounded-3xl border border-dashed border-slate-700">Tidak ada paket aktif untuk disusun.</div>
                                ) : (
                                    <div className="bg-slate-800 rounded-3xl shadow-lg border border-slate-700 overflow-hidden">
                                        {routeItems.map((pkg, idx) => (
                                            <div key={pkg.packageId} draggable onDragStart={(e) => handleDragStart(e, idx)} onDragOver={(e) => handleDragOver(e, idx)} onDragEnd={handleDragEnd} className={`flex items-center gap-3 p-3 border-b border-slate-700/50 bg-slate-800 cursor-move ${draggedItemIndex === idx ? 'opacity-50 bg-slate-700' : ''}`}>
                                                <div className="flex flex-col items-center gap-1 w-6 shrink-0">
                                                    <button onClick={() => moveRouteUp(idx)} disabled={idx === 0} className="text-slate-400 disabled:opacity-20 p-1 active:bg-slate-700 rounded"><i className="fas fa-chevron-up text-[10px]"></i></button>
                                                    <i className="fas fa-grip-lines text-slate-600 text-xs py-1"></i>
                                                    <button onClick={() => moveRouteDown(idx)} disabled={idx === routeItems.length - 1} className="text-slate-400 disabled:opacity-20 p-1 active:bg-slate-700 rounded"><i className="fas fa-chevron-down text-[10px]"></i></button>
                                                </div>
                                                <div className="flex-1 min-w-0 pointer-events-none pr-2">
                                                    <div className="flex justify-between items-center mb-1">
                                                        <h3 className="font-bold text-white text-xs truncate">{pkg.customerName}</h3>
                                                        <span className="text-[9px] font-bold text-orange-400 truncate ml-2 px-2 py-0.5 bg-slate-900 rounded border border-slate-700">{pkg.olshopName}</span>
                                                    </div>
                                                    <p className="text-[10px] text-slate-400 truncate leading-tight">{pkg.address}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* TAB INPUT RESI */}
                        {activeTab === 'input' && (
                            <div className="animate-fade-in-down bg-slate-800 p-5 rounded-3xl border border-slate-700 shadow-xl relative z-0 mx-1">
                                <h2 className="font-black text-white mb-5 text-lg border-b border-slate-700 pb-3 flex items-center"><div className="w-8 h-8 bg-emerald-900/30 text-emerald-400 rounded-lg flex items-center justify-center mr-3 border border-emerald-800/50"><i className="fas fa-plus text-sm"></i></div>Input Resi Baru</h2>
                                <form onSubmit={handleInputBaru} className="space-y-4 relative">
                                    
                                    <div className="relative z-50">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Nama Toko (Olshop)*</label>
                                        <div className="relative">
                                            <i className="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
                                            <input 
                                                type="text" required autoComplete="off" value={inputOlshopSearch}
                                                onChange={(e) => { setInputOlshopSearch(e.target.value); setShowOlshopDropdown(true); }}
                                                onFocus={() => setShowOlshopDropdown(true)}
                                                className="w-full pl-9 pr-3 py-3 bg-slate-900 border border-slate-700 rounded-xl text-sm text-white font-bold outline-none focus:border-blue-500 transition-colors relative z-50"
                                                placeholder="Ketik/Pilih Olshop..."
                                            />
                                        </div>
                                        {showOlshopDropdown && (
                                            <React.Fragment>
                                                <div className="fixed inset-0 z-40" onClick={() => setShowOlshopDropdown(false)}></div>
                                                <ul className="absolute z-50 w-full mt-2 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl max-h-48 overflow-y-auto custom-scrollbar">
                                                    {masterOlshops.filter(o => o.nama.toLowerCase().includes(inputOlshopSearch.toLowerCase())).map((o, i) => (
                                                        <li key={i} onClick={() => { setInputOlshopSearch(o.nama); setShowOlshopDropdown(false); }} className="p-3.5 text-sm hover:bg-slate-700 cursor-pointer border-b border-slate-700/50 font-bold text-slate-200">{o.nama}</li>
                                                    ))}
                                                    {masterOlshops.filter(o => o.nama.toLowerCase().includes(inputOlshopSearch.toLowerCase())).length === 0 && (
                                                        <li className="p-3 text-xs text-slate-500 italic text-center">Toko tidak ditemukan</li>
                                                    )}
                                                </ul>
                                            </React.Fragment>
                                        )}
                                    </div>

                                    <div><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Nama Penerima*</label><input type="text" name="customerName" required className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white font-bold outline-none focus:border-blue-500 transition-colors" /></div>
                                    <div><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">No HP</label><input type="tel" name="customerPhone" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white font-bold outline-none focus:border-blue-500 transition-colors" /></div>
                                    <div><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Alamat Lengkap*</label><textarea name="address" required rows="2" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white font-bold outline-none focus:border-blue-500 transition-colors resize-none"></textarea></div>
                                    
                                    <div className="grid grid-cols-2 gap-3 relative z-0">
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Hrg Barang</label>
                                            <input type="text" inputMode="numeric" name="hargaPaket" value={valHarga} onChange={(e) => { let v = e.target.value.replace(/\D/g, ''); setValHarga(v ? new Intl.NumberFormat('id-ID').format(v) : ''); }} className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white font-bold outline-none focus:border-blue-500 transition-colors" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Kode Zona (TRF)</label>
                                            <select name="ongkirKode" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-slate-200 font-bold truncate outline-none focus:border-blue-500 transition-colors appearance-none">
                                                <option value="" data-harga="0">Pilih Zona...</option>
                                                {masterZonas.map((z, i) => <option key={i} value={z.id} data-harga={z.harga}>{z.id} ({z.nama}) - Rp{formatCurr(z.harga)}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Tmbhn Ongkir Vol/Jarak</label>
                                        <input type="text" inputMode="numeric" name="tambahanOngkir" value={valTambahan} onChange={(e) => { let v = e.target.value.replace(/\D/g, ''); setValTambahan(v ? new Intl.NumberFormat('id-ID').format(v) : ''); }} className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white font-bold outline-none focus:border-blue-500 transition-colors" />
                                    </div>

                                    <div className="border-t border-slate-700 pt-4 mt-4">
                                        <label className="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-1.5 ml-1">Status Pengantaran</label>
                                        <select value={inputFormStatus} onChange={(e) => setInputFormStatus(e.target.value)} className="w-full bg-slate-900 border border-emerald-500/50 text-emerald-400 rounded-xl p-3 text-sm font-black outline-none focus:border-emerald-400 transition-colors appearance-none">
                                            <option value="Siap Antar">PROSES (Siap Antar)</option>
                                            <option value="SUKSES">SUKSES</option>
                                            <option value="PENDING">PENDING</option>
                                            <option value="CANCEL">CANCEL</option>
                                        </select>
                                    </div>

                                    {inputFormStatus === 'SUKSES' && (
                                        <div className="animate-fade-in-down bg-emerald-900/20 border border-emerald-500/30 p-4 rounded-xl">
                                            <label className="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-1.5 ml-1">Metode Bayar (Wajib)</label>
                                            <select name="metodeBayar" required className="w-full bg-slate-900 border border-emerald-500/50 text-white rounded-xl p-3 text-sm font-bold outline-none appearance-none">
                                                <option value="CASH">CASH</option>
                                                <option value="TF OLSHOP">TF OLSHOP</option>
                                                <option value="TF KANTOR">TF KANTOR</option>
                                            </select>
                                        </div>
                                    )}

                                    {(inputFormStatus === 'PENDING' || inputFormStatus === 'CANCEL') && (
                                        <div className="animate-fade-in-down bg-orange-900/20 border border-orange-500/30 p-4 rounded-xl">
                                            <label className="text-[10px] font-bold text-orange-400 uppercase tracking-widest block mb-1.5 ml-1">Keterangan / Alasan</label>
                                            <input type="text" name="keteranganForm" required placeholder="Tulis alasan..." className="w-full bg-slate-900 border border-orange-500/50 rounded-xl p-3 text-sm text-white font-bold outline-none focus:border-orange-400" />
                                        </div>
                                    )}

                                    <div className="pt-2 relative z-0">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Foto Gambar Paket</label>
                                        <div className="bg-slate-900 border-2 border-dashed border-slate-600 rounded-xl overflow-hidden transition-colors hover:border-slate-500">
                                            {!capturedPhoto ? (
                                                <button type="button" onClick={startCamera} className="w-full py-8 text-slate-500 flex flex-col items-center">
                                                    <i className="fas fa-camera text-3xl mb-3 text-blue-500"></i>
                                                    <span className="text-[11px] font-bold uppercase tracking-widest text-slate-400">Buka Kamera HP</span>
                                                </button>
                                            ) : (
                                                <div className="relative">
                                                    <img src={capturedPhoto} className="w-full max-h-48 object-cover" />
                                                    <button type="button" onClick={retakePhoto} className="absolute top-2 right-2 bg-red-500 text-white px-3 py-1.5 rounded-lg shadow-lg text-[10px] font-bold flex items-center active:scale-90 transition-transform"><i className="fas fa-redo mr-1.5"></i> Ulang</button>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <button type="submit" disabled={isLoading} className="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-900/50 active:scale-95 transition-transform mt-6 text-sm uppercase tracking-widest border border-blue-500/50">Simpan Resi</button>
                                </form>
                            </div>
                        )}

                        {/* TAB HISTORI */}
                        {activeTab === 'histori' && (
                            <div className="animate-fade-in-down px-1">
                                <h2 className="font-black text-white text-lg mb-4 flex items-center"><i className="fas fa-history text-blue-500 mr-2"></i> Histori Tugas</h2>
                                <div className="mb-3 relative">
                                    <i className="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500 text-sm"></i>
                                    <input type="text" placeholder="Cari nama, resi, olshop, nomor HP..." value={searchHistori} onChange={e=>setSearchHistori(e.target.value)} className="w-full pl-10 pr-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-xs outline-none focus:border-blue-500 text-white placeholder-slate-500 transition-colors shadow-sm" />
                                </div>
                                <div className="bg-slate-800 p-3 rounded-xl shadow-sm border border-slate-700 mb-3 flex items-center gap-2">
                                    <div className="flex-1 relative">
                                        <i className="far fa-calendar-alt absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500 text-[10px]"></i>
                                        <input type="date" value={historiStartDate} onChange={e=>setHistoriStartDate(e.target.value)} className="w-full pl-8 pr-2 py-2 bg-slate-900 border border-slate-600 rounded-lg text-[10px] outline-none focus:border-blue-500 text-slate-300 font-bold" />
                                    </div>
                                    <span className="text-[10px] font-bold text-slate-500">s/d</span>
                                    <div className="flex-1 relative">
                                        <i className="far fa-calendar-alt absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500 text-[10px]"></i>
                                        <input type="date" value={historiEndDate} onChange={e=>setHistoriEndDate(e.target.value)} className="w-full pl-8 pr-2 py-2 bg-slate-900 border border-slate-600 rounded-lg text-[10px] outline-none focus:border-blue-500 text-slate-300 font-bold" />
                                    </div>
                                </div>
                                <div className="flex gap-2 mb-4 overflow-x-auto scrollbar-hide py-1">
                                    <button onClick={() => setHistoriStatusFilter('semua')} className={`px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest shrink-0 transition-colors border ${historiStatusFilter === 'semua' ? 'bg-blue-600 text-white border-blue-500' : 'bg-slate-800 text-slate-400 border-slate-700'}`}>Semua</button>
                                    <button onClick={() => setHistoriStatusFilter('sukses')} className={`px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest shrink-0 transition-colors border ${historiStatusFilter === 'sukses' ? 'bg-emerald-600 text-white border-emerald-500' : 'bg-slate-800 text-slate-400 border-slate-700'}`}>Sukses</button>

                                        const stat = String(pkg.status).toUpperCase().replace('_', ' ');

                                        if (stat === 'SUKSES') bgBadge = 'bg-emerald-900/30 text-emerald-400 border-emerald-800/50';

                                        if (stat === 'CANCEL' || stat === 'BATAL') bgBadge = 'bg-red-900/30 text-red-400 border-red-800/50';

                                            <div key={i} onClick={() => setDetailPkg(pkg)} className="bg-slate-800 border border-slate-700 rounded-2xl py-3 pr-3 flex justify-between items-center shadow-lg relative overflow-hidden cursor-pointer active:scale-[0.98] transition-transform">

                        <button onClick={() => setActiveTab('jemput')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'jemput' ? 'text-blue-500' : 'text-slate-500'}`}><i className="fas fa-truck-pickup text-xl mb-1"></i><span className="text-[8px] font-bold tracking-widest uppercase">Jemput</span></button>
                        <button onClick={() => setActiveTab('rute')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'rute' ? 'text-blue-500' : 'text-slate-500'}`}><i className="fas fa-route text-xl mb-1"></i><span className="text-[8px] font-bold tracking-widest uppercase">Rute</span></button>
                        <div className="relative -top-5 flex-shrink-0 px-2"><button onClick={() => setActiveTab('input')} className="w-12 h-12 bg-blue-600 text-white rounded-full shadow-lg shadow-blue-900/50 flex items-center justify-center text-lg border-4 border-slate-900 active:scale-95 transition-transform"><i className="fas fa-plus"></i></button></div>
                        <button onClick={() => setActiveTab('histori')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'histori' ? 'text-blue-500' : 'text-slate-500'}`}><i className="fas fa-history text-xl mb-1"></i><span className="text-[8px] font-bold tracking-widest uppercase">Histori</span></button>
                        <button onClick={() => setActiveTab('rekap')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'rekap' ? 'text-blue-500' : 'text-slate-500'}`}><i className="fas fa-clipboard-list text-xl mb-1"></i><span className="text-[8px] font-bold tracking-widest uppercase">Rekap</span></button>
                        <button onClick={() => setActiveTab('saldo')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'saldo' ? 'text-blue-500' : 'text-slate-500'}`}><i className="fas fa-wallet text-xl mb-1"></i><span className="text-[8px] font-bold tracking-widest uppercase">Saldo</span></button>

                    {}
                    {/* MODAL LAPORAN SCREENSHOT */}
                    {detailPkg && !isModalOpen && !isEditAdminModalOpen && (
                        <div className="fixed inset-0 z-[100] bg-black/90 flex flex-col justify-center items-center p-5 animate-fade-in-down backdrop-blur-sm" onClick={() => setDetailPkg(null)}>

                                        <div className="text-right">

                                            <p className="font-black text-blue-400 text-xl">{formatCurr(detailPkg.totalTagihan)}</p>
                                        </div>

                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL EDIT DATA (KHUSUS ADMIN) */}
                    {isEditAdminModalOpen && (
                        <div className="absolute inset-0 z-[70] bg-black/80 flex flex-col justify-end animate-fade-in-down h-full backdrop-blur-sm">
                            <div className="flex-1" onClick={() => setIsEditAdminModalOpen(false)}></div>
                            <div className="bg-slate-900 rounded-t-[2.5rem] shadow-[0_-20px_25px_-5px_rgba(0,0,0,0.5)] flex flex-col max-h-[90vh] border-t border-slate-700 pb-6">
                                <div className="p-6 border-b border-slate-800 flex justify-between items-center shrink-0">
                                    <h3 className="font-black text-white text-lg flex items-center"><i className="fas fa-user-edit text-orange-500 mr-2.5"></i> Edit Info (Admin)</h3>
                                    <button onClick={() => setIsEditAdminModalOpen(false)} className="w-8 h-8 bg-slate-800 hover:bg-slate-700 text-slate-400 rounded-full flex items-center justify-center transition-colors"><i className="fas fa-times text-sm"></i></button>
                                </div>
                                <div className="p-6 overflow-y-auto flex-1">
                                    <form onSubmit={handleEditAdminSubmit} className="space-y-4">
                                        <div className="bg-slate-800 border border-slate-700 p-4 rounded-xl mb-4 text-center">
                                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1.5">No. Resi</p>
                                            <p className="text-lg font-mono font-black text-orange-400 tracking-widest">{editAdminData.packageId}</p>
                                        </div>

                                        <div>
                                            <label className="block text-[11px] font-bold text-slate-400 mb-2 ml-1 uppercase tracking-widest">Nama Customer</label>
                                            <input 
                                                type="text" 
                                                value={editAdminData.customerName}
                                                onChange={e => setEditAdminData({...editAdminData, customerName: e.target.value})}
                                                className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-sm font-semibold text-white outline-none focus:border-orange-500 transition-colors" 
                                            />
                                        </div>

                                        <div>
                                            <label className="block text-[11px] font-bold text-slate-400 mb-2 ml-1 uppercase tracking-widest">Nomor HP</label>
                                            <input 
                                                type="text" 
                                                value={editAdminData.customerPhone}
                                                onChange={e => setEditAdminData({...editAdminData, customerPhone: e.target.value})}
                                                className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-sm font-semibold text-white outline-none focus:border-orange-500 transition-colors" 
                                            />
                                        </div>

                                        <div>
                                            <label className="block text-[11px] font-bold text-slate-400 mb-2 ml-1 uppercase tracking-widest">Nama Olshop</label>
                                            <select 
                                                value={editAdminData.olshopName}
                                                onChange={e => setEditAdminData({...editAdminData, olshopName: e.target.value})}
                                                className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-sm font-bold text-white outline-none focus:border-orange-500 appearance-none transition-colors"
                                            >
                                                {!masterOlshops.some(o => o.nama === editAdminData.olshopName) && editAdminData.olshopName && (
                                                    <option value={editAdminData.olshopName}>{editAdminData.olshopName}</option>
                                                )}
                                                {masterOlshops.map((o, i) => <option key={i} value={o.nama}>{o.nama}</option>)}
                                            </select>
                                        </div>

                                        <button type="submit" disabled={isLoading} className="w-full bg-orange-600 text-white font-black py-4 rounded-xl shadow-lg shadow-orange-900/50 active:scale-95 text-xs uppercase tracking-widest mt-4 transition-transform border border-orange-500/50">
                                            {isLoading ? <i className="fas fa-spinner fa-spin"></i> : 'Simpan Perubahan'}
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL KAMERA FULL SCREEN APPSHEET STYLE */}
                    {isCameraFullScreen && (
                        <div className="fixed inset-0 z-[9999] bg-black flex flex-col animate-slide-up">
                            <div className="absolute top-0 w-full p-4 flex justify-between items-center z-10 bg-gradient-to-b from-black/80 to-transparent">
                                <span className="text-white font-bold text-sm drop-shadow-md">Ambil Foto Gambar Paket</span>
                                <button type="button" onClick={stopCamera} className="text-white w-8 h-8 flex items-center justify-center bg-black/40 rounded-full border border-white/20">
                                    <i className="fas fa-times"></i>
                                </button>
                            </div>
                            
                            <div className="flex-1 relative bg-black flex items-center justify-center overflow-hidden">
                                <video ref={videoCallbackRef} autoPlay playsInline muted className="absolute inset-0 w-full h-full object-cover"></video>
                                <div className="absolute inset-0 border-[1px] border-white/20 pointer-events-none grid grid-cols-3 grid-rows-3">
                                    <div className="border-r border-b border-white/20"></div>
                                    <div className="border-b border-white/20"></div>
                                    <div className="border-l border-b border-white/20"></div>
                                    <div className="border-r border-b border-white/20"></div>
                                    <div className="border-b border-white/20"></div>
                                    <div className="border-l border-b border-white/20"></div>
                                    <div className="border-r border-white/20"></div>
                                    <div></div>
                                    <div className="border-l border-white/20"></div>
                                </div>
                            </div>
                            
                            <div className="h-32 bg-black flex items-center justify-center w-full z-10 pb-4 shrink-0 border-t border-white/10">
                                <button type="button" onClick={takePhoto} className="w-16 h-16 bg-white rounded-full flex items-center justify-center border-4 border-gray-400 active:scale-95 transition-transform">
                                    <div className="w-14 h-14 rounded-full border-2 border-black"></div>
                                </button>
                            </div>
                            <canvas ref={canvasRef} style={{ display: 'none' }}></canvas>
                        </div>
                    )}

                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
