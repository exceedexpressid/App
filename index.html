<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kurir - Exceed Express</title>
    
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a"> <!-- Biru Dongker -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>

    <style>
        body { 
            background-color: #f3f4f6; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overscroll-behavior-y: none; 
            -webkit-tap-highlight-color: transparent;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes slideUp { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.2s ease-out forwards; }
        
        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }

        .glass-nav { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); }
        .dragging { opacity: 0.5; background: #fff7ed; border: 1px dashed #f97316; }
    </style>
</head>
<body class="antialiased flex justify-center bg-gray-200 h-[100dvh] overflow-hidden">
    <div id="root" class="w-full max-w-md bg-gray-50 shadow-2xl h-full flex flex-col relative"></div>

    <script type="text/babel" data-presets="env,react">
        /** @jsx React.createElement */
        /** @jsxFrag React.Fragment */
        
        const { useState, useEffect, useRef, useMemo } = React;

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVHojspm17WSZU42RaMtgiNWJikRfGyTlPh1FczlDJS9JL52PxX0d9RpkNJYM4g424/exec";
        const APPSHEET_APP_ID = "APLIKASEXCEED-327461285";

        const formatCurr = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num || 0);
        
        const getFotoUrl = (fileKey) => {
            if (!fileKey || String(fileKey).trim() === '') return null;
            if (String(fileKey).startsWith('http://') || String(fileKey).startsWith('https://')) return fileKey;
            return `https://www.appsheet.com/template/gettablefileurl?appName=${APPSHEET_APP_ID}&tableName=InputPaket&fileName=${encodeURIComponent(fileKey)}`;
        };

        const formatWA = (phone) => {
            if(!phone) return '';
            let p = String(phone).replace(/\D/g, '');
            if(p.startsWith('0')) p = '62' + p.substring(1);
            return p;
        };

        const getFinancials = (pkg) => {
            const hBarang = Number(pkg.hargaPaket) || 0;
            const tagihan = Number(pkg.totalTagihan) || 0;
            const selisihTagihan = tagihan - hBarang > 0 ? tagihan - hBarang : 0;
            let oTambahan = Number(pkg.tambahanOngkir) || 0;
            let oDasar = Number(pkg.ongkirDasar) || 0;
            if (oTambahan === 0 && oDasar > 0 && selisihTagihan > oDasar) oTambahan = selisihTagihan - oDasar;
            else if (oTambahan === 0 && oDasar === 0 && selisihTagihan > 0) oDasar = selisihTagihan;
            if (oDasar === 0 && oTambahan > 0 && selisihTagihan > oTambahan) oDasar = selisihTagihan - oTambahan;
            return { hBarang, tagihan, oDasar, oTambahan, oTotal: oDasar + oTambahan };
        };

        function App() {
            const [kurirId, setKurirId] = useState(localStorage.getItem('ex_gojek_kurirId') || '');
            const [kurirName, setKurirName] = useState(localStorage.getItem('ex_gojek_kurirName') || '');
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('ex_gojek_kurirId'));
            
            const [activeTab, setActiveTab] = useState('tugas'); 
            const [tugasViewMode, setTugasViewMode] = useState('compact'); 
            const [searchTugas, setSearchTugas] = useState(''); 
            
            const [isLoading, setIsLoading] = useState(false);
            const [loadingMessage, setLoadingMessage] = useState('');
            
            const [packages, setPackages] = useState([]);
            const [jemputans, setJemputans] = useState([]);
            const [masterOlshops, setMasterOlshops] = useState([]);
            const [masterZonas, setMasterZonas] = useState([]);
            
            const [routeOrder, setRouteOrder] = useState(() => JSON.parse(localStorage.getItem('ex_gojek_routeOrder') || '[]'));
            const [routeItems, setRouteItems] = useState([]); 
            const [draggedItemIndex, setDraggedItemIndex] = useState(null);

            const [historiStatusFilter, setHistoriStatusFilter] = useState('semua');
            const [historiStartDate, setHistoriStartDate] = useState('');
            const [historiEndDate, setHistoriEndDate] = useState('');
            
            const [saldoStartDate, setSaldoStartDate] = useState(new Date().toISOString().split('T')[0]);
            const [saldoEndDate, setSaldoEndDate] = useState(new Date().toISOString().split('T')[0]);

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedPkg, setSelectedPkg] = useState(null);
            const [updateStatusVal, setUpdateStatusVal] = useState(''); 
            
            const [detailPkg, setDetailPkg] = useState(null); 
            
            const [inputOlshopSearch, setInputOlshopSearch] = useState('');
            const [showOlshopDropdown, setShowOlshopDropdown] = useState(false);
            const [valHarga, setValHarga] = useState('');
            const [valTambahan, setValTambahan] = useState('');
            const [inputFormStatus, setInputFormStatus] = useState('SIAP_ANTAR');

            const [cameraStream, setCameraStream] = useState(null);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [capturedPhoto, setCapturedPhoto] = useState(null);
            const [isCameraFullScreen, setIsCameraFullScreen] = useState(false);

            const loadData = async (forceLoginId = null) => {
                setIsLoading(true); setLoadingMessage('Menyinkronkan Data...');
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=getInitData&t=${new Date().getTime()}`);
                    const data = await res.json();
                    if(data.status === 'success') {
                        setMasterOlshops(data.data.olshop || []); setMasterZonas(data.data.zona || []);
                        const currentId = forceLoginId || kurirId;
                        const isMaster = currentId === 'exceedexpress.id@gmail.com';
                        if (currentId) {
                            const myPkgs = data.data.packages.filter(p => isMaster || String(p.kurirEmailAsli).toLowerCase() === currentId.toLowerCase() || String(p.kurirId).toLowerCase() === currentId.toLowerCase());
                            setPackages(myPkgs.reverse());
                            const myJemputans = (data.data.jemputan || []).filter(j => isMaster || String(j.status).toLowerCase() === 'menunggu' || String(j.status).trim() === '' || String(j.kurirId).toLowerCase() === currentId.toLowerCase() || String(j.kurirNama).toLowerCase() === kurirName.toLowerCase());
                            setJemputans(myJemputans.reverse());
                        }
                    }
                } catch(e) { alert("Koneksi terputus. Pastikan internet stabil."); }
                setIsLoading(false);
            };

            useEffect(() => { if (isLoggedIn) loadData(); }, [isLoggedIn]);

            const handleLogin = async (e) => {
                e.preventDefault();
                const inputId = e.target.kodeUser.value.trim().toLowerCase();
                const inputPass = e.target.password.value.trim(); 
                
                if (inputId === 'exceedexpress.id@gmail.com' && inputPass === 'adminexceed') {
                    localStorage.setItem('ex_gojek_kurirId', inputId); 
                    localStorage.setItem('ex_gojek_kurirName', 'Exceed Express'); 
                    setKurirId(inputId); setKurirName('Exceed Express'); setIsLoggedIn(true); loadData(inputId); return;
                }
                
                setIsLoading(true); setLoadingMessage('Memverifikasi Akun...');
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=getInitData`);
                    const data = await res.json();
                    if(data.status === 'success') {
                        const validKurir = (data.data.kurir || []).find(k => String(k.id).toLowerCase() === inputId);
                        if (validKurir) {
                            localStorage.setItem('ex_gojek_kurirId', validKurir.id); localStorage.setItem('ex_gojek_kurirName', validKurir.nama);
                            setKurirId(validKurir.id); setKurirName(validKurir.nama); setIsLoggedIn(true); loadData(validKurir.id);
                        } else { alert("ID Kurir tidak terdaftar."); }
                    }
                } catch (e) { alert("Gagal memverifikasi login."); }
                setIsLoading(false);
            };

            const handleLogout = () => {
                if(window.confirm("Yakin ingin keluar?")) {
                    localStorage.removeItem('ex_gojek_kurirId'); localStorage.removeItem('ex_gojek_kurirName'); 
                    setIsLoggedIn(false); setPackages([]); setJemputans([]);
                }
            };

            const tugasAktif = useMemo(() => {
                let aktif = packages.filter(p => { 
                    const s = String(p.status).toLowerCase().replace(' ', '_'); 
                    return s === 'proses' || s === 'siap_antar' || s === 'pending'; 
                });
                
                if(searchTugas) {
                    const q = searchTugas.toLowerCase();
                    aktif = aktif.filter(p => String(p.customerName).toLowerCase().includes(q) || String(p.packageId).toLowerCase().includes(q));
                }

                return aktif.sort((a, b) => {
                    const isPendingA = String(a.status).toLowerCase() === 'pending'; 
                    const isPendingB = String(b.status).toLowerCase() === 'pending';
                    if (isPendingA && !isPendingB) return 1; 
                    if (!isPendingA && isPendingB) return -1; 
                    const posA = routeOrder.indexOf(a.packageId) !== -1 ? routeOrder.indexOf(a.packageId) : 99999;
                    const posB = routeOrder.indexOf(b.packageId) !== -1 ? routeOrder.indexOf(b.packageId) : 99999;
                    return posA - posB;
                });
            }, [packages, routeOrder, searchTugas]);

            useEffect(() => {
                if (activeTab === 'rute') {
                    const rItems = packages.filter(p => { const s = String(p.status).toLowerCase().replace(' ', '_'); return s === 'proses' || s === 'siap_antar' || s === 'pending'; });
                    rItems.sort((a, b) => {
                        const posA = routeOrder.indexOf(a.packageId) !== -1 ? routeOrder.indexOf(a.packageId) : 99999;
                        const posB = routeOrder.indexOf(b.packageId) !== -1 ? routeOrder.indexOf(b.packageId) : 99999;
                        return posA - posB;
                    });
                    setRouteItems(rItems);
                }
            }, [activeTab, packages, routeOrder]);

            const moveRouteUp = (index) => { if (index === 0) return; const newItems = [...routeItems]; [newItems[index - 1], newItems[index]] = [newItems[index], newItems[index - 1]]; setRouteItems(newItems); };
            const moveRouteDown = (index) => { if (index === routeItems.length - 1) return; const newItems = [...routeItems]; [newItems[index + 1], newItems[index]] = [newItems[index], newItems[index + 1]]; setRouteItems(newItems); };
            const handleDragStart = (e, index) => { setDraggedItemIndex(index); e.dataTransfer.effectAllowed = 'move'; };
            const handleDragOver = (e, index) => { e.preventDefault(); if (draggedItemIndex === null || draggedItemIndex === index) return; const newItems = [...routeItems]; const draggedItem = newItems[draggedItemIndex]; newItems.splice(draggedItemIndex, 1); newItems.splice(index, 0, draggedItem); setDraggedItemIndex(index); setRouteItems(newItems); };
            const handleDragEnd = () => { setDraggedItemIndex(null); };
            const saveRoute = () => {
                const newOrder = routeItems.map(p => p.packageId);
                setRouteOrder(newOrder); localStorage.setItem('ex_gojek_routeOrder', JSON.stringify(newOrder));
                alert("Berhasil! Rute pengantaran sudah diperbarui."); setActiveTab('tugas');
            };

            const startCamera = async () => { 
                try { 
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }); 
                    setCameraStream(stream); setIsCameraFullScreen(true); 
                } catch (err) { alert("Izin kamera ditolak."); } 
            };
            const stopCamera = () => { if (cameraStream) { cameraStream.getTracks().forEach(track => track.stop()); setCameraStream(null); } setIsCameraFullScreen(false); };
            
            const takePhoto = () => { 
                if (videoRef.current && canvasRef.current) { 
                    const video = videoRef.current; const canvas = canvasRef.current; 
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight; 
                    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height); 
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.6); 
                    setCapturedPhoto(dataUrl); 
                    stopCamera(); 

                    // Otomatis Simpan ke Galeri HP
                    try {
                        const link = document.createElement('a');
                        link.href = dataUrl;
                        link.download = `Foto_Paket_Exceed_${new Date().getTime()}.jpg`;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    } catch(e) { console.log("Gagal auto-save:", e); }
                } 
            };
            const retakePhoto = () => { setCapturedPhoto(null); startCamera(); };

            useEffect(() => { if (activeTab !== 'input' && isCameraFullScreen) stopCamera(); }, [activeTab, isCameraFullScreen]);
            useEffect(() => {
                if (isCameraFullScreen && cameraStream && videoRef.current) {
                    videoRef.current.srcObject = cameraStream;
                    videoRef.current.setAttribute('playsinline', true); 
                    videoRef.current.muted = true;
                    videoRef.current.play().catch(e => console.error("Kamera ditahan browser:", e));
                }
            }, [isCameraFullScreen, cameraStream]);

            const openUpdateModal = (pkg, e) => {
                e.stopPropagation();
                setSelectedPkg(pkg);
                setUpdateStatusVal(String(pkg.status).toUpperCase() === 'PROSES' || String(pkg.status).toUpperCase() === 'SIAP_ANTAR' ? 'SIAP_ANTAR' : String(pkg.status).toUpperCase());
                setIsModalOpen(true);
            };

            const handleUpdateStatus = async (e) => {
                e.preventDefault();
                const nStatus = e.target.status.value;
                const nKet = e.target.keterangan ? e.target.keterangan.value : "";
                const nMetode = e.target.metodeBayarUpdate ? e.target.metodeBayarUpdate.value : "";

                setIsLoading(true); setLoadingMessage('Menyimpan Status...');
                try {
                    const formData = new URLSearchParams(); 
                    formData.append('action', 'updateStatus'); 
                    formData.append('packageId', selectedPkg.packageId); 
                    formData.append('status', nStatus === 'SIAP_ANTAR' ? 'Siap Antar' : nStatus); 
                    formData.append('keterangan', nKet);
                    if (nMetode !== "") formData.append('metodeBayar', nMetode);
                    
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
                    const result = await response.json();
                    if (result.status === 'success') { alert("Berhasil diupdate!"); setIsModalOpen(false); loadData(); } else { alert("Gagal: " + result.message); }
                } catch (error) { alert("Error jaringan."); } finally { setIsLoading(false); }
            };

            const handleInputBaru = async (e) => {
                e.preventDefault();
                const olshopName = inputOlshopSearch; 
                const customerName = e.target.customerName.value; const address = e.target.address.value;
                if (!olshopName || !customerName || !address) { alert("Olshop, Customer, dan Alamat wajib!"); return; }
                
                const zonaSelect = e.target.ongkirKode; 
                const ongkirKodeTeks = zonaSelect.value; 
                const hargaPaket = e.target.hargaPaket.value.replace(/\./g, '') || 0; 
                const tambahanOngkir = e.target.tambahanOngkir.value.replace(/\./g, '') || 0;
                
                setIsLoading(true); setLoadingMessage('Mendaftar Resi...');
                try {
                    const idPaket = "EXCD" + Math.floor(100000 + Math.random() * 900000);
                    const formData = new URLSearchParams(); 
                    formData.append('action', 'addPackage'); 
                    formData.append('idPaket', idPaket); 
                    formData.append('olshopName', olshopName); 
                    formData.append('customerName', customerName); 
                    formData.append('customerPhone', e.target.customerPhone.value); 
                    formData.append('address', address); 
                    formData.append('hargaPaket', hargaPaket); 
                    formData.append('ongkirKode', ongkirKodeTeks); 
                    formData.append('tambahanOngkir', tambahanOngkir); 
                    formData.append('status', inputFormStatus === 'SIAP_ANTAR' ? 'Siap Antar' : inputFormStatus); 
                    
                    if (inputFormStatus === 'SUKSES') formData.append('metodeBayar', e.target.metodeBayar.value);
                    if (inputFormStatus === 'PENDING' || inputFormStatus === 'CANCEL') formData.append('keterangan', e.target.keteranganForm.value);

                    formData.append('kurirId', kurirId);
                    if (capturedPhoto) formData.append('fotoBase64', capturedPhoto);
                    
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
                    const result = await response.json();
                    if (result.status === 'success') { 
                        alert(`Berhasil! RESI: ${idPaket}`); 
                        e.target.reset(); setInputOlshopSearch(''); setValHarga(''); setValTambahan(''); setCapturedPhoto(null); setInputFormStatus('SIAP_ANTAR');
                        setActiveTab('tugas'); loadData(); 
                    } else { alert("Gagal: " + result.message); }
                } catch (error) { alert("Error jaringan."); } finally { setIsLoading(false); }
            };

            const handleAmbilJemputan = async (idJemput) => {
                if(!window.confirm("Ambil tugas jemputan ini?")) return;
                setIsLoading(true); setLoadingMessage('Mengambil Tugas...');
                try {
                    const formData = new URLSearchParams(); formData.append('action', 'ambilJemputan'); formData.append('idJemput', idJemput); formData.append('kurirId', kurirId); formData.append('kurirNama', kurirName);
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
                    const result = await response.json();
                    if (result.status === 'success') { alert("Berhasil! Tugas ini sekarang milik Anda."); loadData(); } else { alert("Gagal: " + result.message); }
                } catch (error) { alert("Error jaringan."); } finally { setIsLoading(false); }
            };

            const handleSelesaiJemputan = async (idJemput) => {
                if(!window.confirm("Tandai jemputan selesai?")) return;
                setIsLoading(true); setLoadingMessage('Menyelesaikan Tugas...');
                try {
                    const formData = new URLSearchParams(); formData.append('action', 'selesaiJemputan'); formData.append('idJemput', idJemput);
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
                    const result = await response.json();
                    if (result.status === 'success') { alert("Jemputan Selesai!"); loadData(); } else { alert("Gagal: " + result.message); }
                } catch (error) { alert("Error jaringan."); } finally { setIsLoading(false); }
            };

            const historiPkgs = useMemo(() => {
                let hPkgs = packages.filter(p => {
                    const s = String(p.status).toLowerCase().replace(' ', '_');
                    if (historiStatusFilter === 'semua') return s === 'sukses' || s === 'cancel' || s === 'batal' || s === 'pending';
                    if (historiStatusFilter === 'cancel') return s === 'cancel' || s === 'batal';
                    return s === historiStatusFilter;
                });

                if (historiStartDate || historiEndDate) {
                   hPkgs = hPkgs.filter(p => {
                      let pDateStr = p.dateString || p.tanggalInput || p.tanggal || '';
                      if (!pDateStr) return false; let normalizedDateStr = "";
                      try {
                          let d = new Date(pDateStr);
                          if (isNaN(d.getTime()) && pDateStr.includes('/')) { const parts = pDateStr.split('/'); if (parts.length === 3) d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); }
                          if (!isNaN(d.getTime())) { const year = d.getFullYear(); const month = String(d.getMonth() + 1).padStart(2, '0'); const day = String(d.getDate()).padStart(2, '0'); normalizedDateStr = `${year}-${month}-${day}`; } 
                          else { normalizedDateStr = pDateStr.split('T')[0]; }
                      } catch(e) { normalizedDateStr = pDateStr.split('T')[0]; }
                      const sD = historiStartDate || "2000-01-01"; const eD = historiEndDate || "2100-01-01";
                      return normalizedDateStr >= sD && normalizedDateStr <= eD;
                   });
                }
                return hPkgs;
            }, [packages, historiStatusFilter, historiStartDate, historiEndDate]);

            let s_sukses = 0, setoran = 0, rincianCash = 0, tambahanOngkirCash = 0, tambahanOngkirTF = 0;
            packages.forEach(pkg => {
                const stat = String(pkg.status).toLowerCase();
                if(stat !== 'sukses') return;

                let pDateStr = pkg.dateString || pkg.tanggal || '';
                let validSaldo = false;
                if (!pDateStr) return; 
                let normalizedDateStr = "";
                try {
                    let d = new Date(pDateStr);
                    if (isNaN(d.getTime()) && pDateStr.includes('/')) { const parts = pDateStr.split('/'); if (parts.length === 3) d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); }
                    if (!isNaN(d.getTime())) { const year = d.getFullYear(); const month = String(d.getMonth() + 1).padStart(2, '0'); const day = String(d.getDate()).padStart(2, '0'); normalizedDateStr = `${year}-${month}-${day}`; } 
                    else { normalizedDateStr = pDateStr.split('T')[0]; }
                } catch(e) { normalizedDateStr = pDateStr.split('T')[0]; }
                const sD = saldoStartDate || "2000-01-01"; const eD = saldoEndDate || "2100-01-01";
                if (normalizedDateStr >= sD && normalizedDateStr <= eD) validSaldo = true;

                if (validSaldo) {
                    s_sukses++; 
                    const { hBarang, oDasar, oTambahan } = getFinancials(pkg); 
                    const metode = String(pkg.metodeBayar).trim().toUpperCase();
                    let currentSetoran = 0;
                    if (metode === 'TF OLSHOP' || metode === 'TF KANTOR') { tambahanOngkirTF += oTambahan; currentSetoran = -oTambahan; } 
                    else if (metode === 'CASH') { const cashDiterima = hBarang + oDasar + oTambahan; rincianCash += cashDiterima; tambahanOngkirCash += oTambahan; currentSetoran = hBarang + oDasar; }
                    setoran += currentSetoran;
                }
            });

            if (!isLoggedIn) {
                return (
                    <div className="flex h-full items-center justify-center p-6 bg-slate-900 w-full">
                        <div className="w-full bg-slate-800 border border-slate-700 p-6 rounded-2xl shadow-xl">
                            <div className="flex justify-center mb-6">
                                <div className="w-20 h-20 bg-orange-500/10 rounded-full flex items-center justify-center border border-orange-500/20">
                                    <i className="fas fa-motorcycle text-4xl text-orange-500"></i>
                                </div>
                            </div>
                            <h1 className="text-2xl font-black text-white text-center mb-1">Kurir App</h1>
                            <p className="text-xs text-slate-400 text-center mb-8">Login dengan akun kurir Anda</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="block text-[10px] font-bold text-slate-400 mb-1 ml-1">Email / ID Kurir</label>
                                    <input type="text" name="kodeUser" required className="w-full px-3 py-3 bg-slate-900 border border-slate-600 rounded-xl focus:outline-none focus:border-orange-500 text-xs font-semibold text-white placeholder-slate-500" placeholder="Masukkan ID..." />
                                </div>
                                <div>
                                    <label className="block text-[10px] font-bold text-slate-400 mb-1 ml-1">Password</label>
                                    <input type="password" name="password" className="w-full px-3 py-3 bg-slate-900 border border-slate-600 rounded-xl focus:outline-none focus:border-orange-500 text-xs font-semibold text-white placeholder-slate-500" placeholder="Masukkan Password..." />
                                </div>
                                <button type="submit" disabled={isLoading} className="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-orange-600/30 transition-transform active:scale-95 mt-2 text-xs uppercase tracking-wider">
                                    {isLoading ? 'Masuk...' : 'Masuk Dashboard'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <React.Fragment>
                    {isLoading && (
                        <div className="absolute inset-0 z-[999] bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center">
                            <div className="w-10 h-10 border-4 border-orange-500/30 border-t-orange-500 rounded-full animate-spin mb-2"></div>
                            <span className="text-[10px] font-bold text-orange-400">{loadingMessage}</span>
                        </div>
                    )}

                    <header className="glass-nav h-14 flex items-center justify-between px-3 text-white shrink-0 z-20 border-b border-slate-700">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-orange-500 rounded-full flex items-center justify-center text-white"><i className="fas fa-user text-xs"></i></div>
                            <div className="flex flex-col">
                                <span className="font-bold text-[11px] leading-tight truncate w-32 text-slate-800">{kurirName}</span>
                                <span className="text-[8px] font-bold text-emerald-600 flex items-center"><span className="w-1.5 h-1.5 bg-emerald-500 rounded-full mr-1 animate-pulse"></span> Online</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => loadData()} className="bg-slate-800 border border-slate-600 shadow-sm px-2.5 py-1.5 flex items-center justify-center rounded-lg hover:bg-slate-700 active:scale-95 text-white transition-all">
                                <i className={`fas fa-sync-alt text-[10px] text-orange-400 mr-1.5 ${isLoading ? 'animate-spin' : ''}`}></i>
                                <span className="text-[9px] font-black uppercase">Refresh</span>
                            </button>
                            <button onClick={handleLogout} className="w-8 h-8 flex items-center justify-center rounded-full bg-red-500/20 hover:bg-red-500/40 text-red-500 active:scale-95 transition-all"><i className="fas fa-sign-out-alt text-xs"></i></button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto scrollbar-hide bg-gray-50 z-0 pb-16 pt-2 px-2">
                        
                        {/* TAB: TUGAS ANTARAN */}
                        {activeTab === 'tugas' && (
                            <div className="animate-slide-up">
                                <div className="flex justify-between items-center mb-2 px-1">
                                    <h2 className="font-black text-slate-800 text-[13px] flex items-center"><i className="fas fa-map-marked-alt text-orange-500 mr-1.5"></i> Antaran</h2>
                                    <div className="flex items-center gap-1.5">
                                        <div className="bg-white border border-gray-200 p-0.5 rounded flex shadow-sm">
                                            <button onClick={() => setTugasViewMode('standard')} className={`p-1 rounded transition-colors ${tugasViewMode === 'standard' ? 'bg-orange-100 text-orange-600' : 'text-gray-400'}`}><i className="fas fa-th-large text-[9px]"></i></button>
                                            <button onClick={() => setTugasViewMode('compact')} className={`p-1 rounded transition-colors ${tugasViewMode === 'compact' ? 'bg-orange-100 text-orange-600' : 'text-gray-400'}`}><i className="fas fa-list text-[9px]"></i></button>
                                        </div>
                                        <span className="bg-orange-100 text-orange-700 text-[8px] px-1.5 py-0.5 rounded font-bold border border-orange-200">{tugasAktif.length} Pkt</span>
                                    </div>
                                </div>

                                {/* PENCARIAN */}
                                <div className="mb-3 px-1 relative">
                                    <i className="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-[10px]"></i>
                                    <input type="text" placeholder="Cari nama / resi..." value={searchTugas} onChange={(e) => setSearchTugas(e.target.value)} className="w-full pl-7 pr-3 py-1.5 bg-white border border-gray-200 rounded-lg text-[10px] outline-none focus:border-orange-500" />
                                </div>

                                {tugasAktif.length === 0 ? (
                                    <div className="text-center py-10 bg-white rounded-xl border border-gray-100 shadow-sm mt-2">
                                        <i className="fas fa-box-open text-2xl text-gray-300 mb-2"></i>
                                        <p className="font-bold text-gray-600 text-[11px]">Tugas Selesai / Kosong</p>
                                    </div>
                                ) : (
                                    <div className={`space-y-${tugasViewMode === 'standard' ? '2' : '1.5'}`}>
                                        {tugasAktif.map((pkg, i) => {
                                            const isPending = String(pkg.status).toLowerCase() === 'pending';
                                            const resolvedUrlFoto = getFotoUrl(pkg.fotoBukti);
                                            const { hBarang, oDasar, oTambahan } = getFinancials(pkg);

                                            const waMsg = `Halo kaka, saya kurir dari Exceed express, mau konfirmasi sekaligus antar paket dari Toko/Olshop ${pkg.olshopName}, dengan tagihan COD sebesar ${formatCurr(pkg.totalTagihan)}. Saat ini saya sedang mengantar paket lain sesuai rute. Terima kasih`;
                                            const waLink = pkg.customerPhone ? `https://wa.me/${formatWA(pkg.customerPhone)}?text=${encodeURIComponent(waMsg)}` : null;

                                            if (tugasViewMode === 'compact') {
                                                return (
                                                    <div key={i} onClick={() => setDetailPkg(pkg)} className={`bg-white border ${isPending ? 'border-yellow-200 bg-yellow-50' : 'border-gray-200'} rounded-lg p-1.5 shadow-sm flex items-center gap-1.5 relative overflow-hidden cursor-pointer active:scale-[0.98] transition-transform`}>
                                                        <div className="flex-1 min-w-0">
                                                            <div className="flex items-center gap-1 mb-0.5">
                                                                <span className="font-bold text-[10px] text-gray-800 truncate">{pkg.customerName}</span>
                                                                {isPending && <span className="text-[7px] bg-yellow-200 text-yellow-800 px-1 py-0.5 rounded font-bold leading-none">PENDING</span>}
                                                            </div>
                                                            <div className="text-[8px] text-gray-500 truncate mb-0.5"><span className="font-bold text-orange-600">{pkg.olshopName}</span> • {pkg.customerPhone || '-'}</div>
                                                            <p className="text-[8px] text-gray-500 truncate leading-tight"><i className="fas fa-map-marker-alt text-blue-400 mr-0.5"></i>{pkg.address}</p>
                                                        </div>
                                                        <div className="flex flex-col items-end shrink-0 border-l border-gray-100 pl-1.5">
                                                            <span className="font-black text-blue-600 text-[11px] mb-1">{formatCurr(pkg.totalTagihan)}</span>
                                                            <div className="flex gap-1">
                                                                {waLink && <a href={waLink} target="_blank" onClick={(e)=>e.stopPropagation()} className="bg-green-100 text-green-600 p-1 rounded"><i className="fab fa-whatsapp text-[9px]"></i></a>}
                                                                <button onClick={(e) => openUpdateModal(pkg, e)} className="bg-orange-600 text-white text-[8px] font-bold px-2 py-1 rounded active:scale-95 uppercase">Update</button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            }

                                            return (
                                                <div key={i} onClick={() => setDetailPkg(pkg)} className={`bg-white border ${isPending ? 'border-yellow-200' : 'border-gray-200'} rounded-xl p-2.5 shadow-sm relative overflow-hidden cursor-pointer active:scale-[0.99] transition-transform`}>
                                                    <div className="flex justify-between items-center mb-2">
                                                        <div className="flex items-center gap-1.5">
                                                            <div className="bg-slate-100 text-slate-700 font-mono text-[9px] font-black px-1.5 py-0.5 rounded border border-slate-200">{pkg.packageId}</div>
                                                            <span className="text-[9px] bg-orange-50 text-orange-600 px-1.5 py-0.5 rounded font-bold border border-orange-100 truncate max-w-[100px]">{pkg.olshopName}</span>
                                                            {isPending && <span className="bg-yellow-100 text-yellow-700 text-[8px] font-bold px-1.5 py-0.5 rounded border border-yellow-200">PENDING</span>}
                                                        </div>
                                                        <span className={`text-[8px] font-bold px-1.5 py-0.5 rounded uppercase border ${pkg.metodeBayar === 'CASH' ? 'bg-emerald-50 text-emerald-600 border-emerald-200' : 'bg-purple-50 text-purple-600 border-purple-200'}`}>{pkg.metodeBayar}</span>
                                                    </div>

                                                    <div className="flex gap-2.5 items-start mb-2">
                                                        {resolvedUrlFoto ? (
                                                            <img src={resolvedUrlFoto} className="w-12 h-12 rounded-lg object-cover border border-gray-200 shrink-0" onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }} />
                                                        ) : null}
                                                        <div className={`w-12 h-12 rounded-lg bg-gray-50 border border-dashed border-gray-300 items-center justify-center shrink-0 ${resolvedUrlFoto ? 'hidden' : 'flex'}`}><i className="fas fa-image text-gray-300 text-sm"></i></div>
                                                        
                                                        <div className="flex-1 min-w-0">
                                                            <h3 className="font-black text-gray-800 text-[12px] leading-tight truncate mb-0.5">{pkg.customerName}</h3>
                                                            {pkg.customerPhone && <p className="text-[9px] text-gray-500 mb-0.5"><i className="fas fa-phone mr-1"></i>{pkg.customerPhone}</p>}
                                                            <p className="text-[9px] text-gray-500 leading-snug line-clamp-2"><i className="fas fa-map-marker-alt mr-1 text-blue-400"></i>{pkg.address}</p>
                                                        </div>
                                                    </div>

                                                    <div className="mb-2 text-[8px] text-gray-500 bg-gray-50 p-1.5 rounded-lg border border-gray-100 grid grid-cols-3 gap-0.5 text-center">
                                                        <div><span className="block text-[7px] uppercase">Brg</span><span className="font-bold text-gray-700 text-[9px]">{formatCurr(hBarang)}</span></div>
                                                        <div className="border-l border-r border-gray-200"><span className="block text-[7px] uppercase">Ongkir</span><span className="font-bold text-gray-700 text-[9px]">{formatCurr(oDasar)}</span></div>
                                                        <div><span className="block text-[7px] uppercase">Tmbhn</span><span className="font-bold text-gray-700 text-[9px]">{formatCurr(oTambahan)}</span></div>
                                                    </div>
                                                    
                                                    <div className="flex justify-between items-end">
                                                        <div className="flex gap-2">
                                                            {waLink && (
                                                                <React.Fragment>
                                                                    <a href={waLink} target="_blank" onClick={(e)=>e.stopPropagation()} className="w-7 h-7 rounded-md bg-green-100 text-green-600 flex items-center justify-center border border-green-200"><i className="fab fa-whatsapp text-[12px]"></i></a>
                                                                    <a href={`tel:${pkg.customerPhone}`} onClick={(e)=>e.stopPropagation()} className="w-7 h-7 rounded-md bg-blue-100 text-blue-600 flex items-center justify-center border border-blue-200"><i className="fas fa-phone-alt text-[10px]"></i></a>
                                                                </React.Fragment>
                                                            )}
                                                        </div>
                                                        <div className="flex items-center gap-3">
                                                            <div className="text-right">
                                                                <p className="text-[8px] text-blue-400 font-bold uppercase mb-0.5">Total</p>
                                                                <p className="font-black text-blue-600 text-[12px]">{formatCurr(pkg.totalTagihan)}</p>
                                                            </div>
                                                            <button onClick={(e) => openUpdateModal(pkg, e)} className="bg-orange-600 text-white font-bold text-[9px] px-3 py-1.5 rounded-lg active:scale-95 uppercase">Update</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* TAB: RUTE */}
                        {activeTab === 'rute' && (
                            <div className="animate-slide-up">
                                <div className="flex justify-between items-center mb-2 px-1">
                                    <h2 className="font-black text-gray-800 text-[12px] flex items-center"><i className="fas fa-route text-blue-500 mr-1.5"></i> Susun Rute</h2>
                                    <button onClick={saveRoute} className="bg-blue-600 text-white px-3 py-1 rounded text-[9px] font-bold shadow-sm active:scale-95">Submit Rute</button>
                                </div>

                                {routeItems.length === 0 ? (
                                    <div className="text-center py-8 text-gray-400 text-[10px]">Tidak ada paket aktif untuk disusun.</div>
                                ) : (
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                                        {routeItems.map((pkg, idx) => (
                                            <div key={pkg.packageId} draggable onDragStart={(e) => handleDragStart(e, idx)} onDragOver={(e) => handleDragOver(e, idx)} onDragEnd={handleDragEnd} className={`flex items-center gap-1.5 p-2 border-b border-gray-100 bg-white cursor-move ${draggedItemIndex === idx ? 'dragging' : ''}`}>
                                                <div className="flex flex-col items-center gap-1 w-5 shrink-0">
                                                    <button onClick={() => moveRouteUp(idx)} disabled={idx === 0} className="text-gray-400 disabled:opacity-20 p-0.5"><i className="fas fa-chevron-up text-[9px]"></i></button>
                                                    <i className="fas fa-grip-lines text-gray-300 text-[10px]"></i>
                                                    <button onClick={() => moveRouteDown(idx)} disabled={idx === routeItems.length - 1} className="text-gray-400 disabled:opacity-20 p-0.5"><i className="fas fa-chevron-down text-[9px]"></i></button>
                                                </div>
                                                <div className="flex-1 min-w-0 pointer-events-none">
                                                    <div className="flex justify-between items-center mb-0.5">
                                                        <h3 className="font-bold text-gray-800 text-[11px] truncate">{pkg.customerName}</h3>
                                                        <span className="text-[8px] font-bold text-orange-500 truncate">{pkg.olshopName}</span>
                                                    </div>
                                                    <p className="text-[9px] text-gray-500 truncate leading-tight">{pkg.address}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* TAB: JEMPUT */}
                        {activeTab === 'jemput' && (
                            <div className="animate-slide-up">
                                <div className="bg-blue-50 border border-blue-100 p-2.5 rounded-xl mb-3 flex items-start gap-2">
                                    <i className="fas fa-bullhorn text-blue-500 text-sm"></i>
                                    <div>
                                        <h3 className="font-bold text-blue-800 text-[11px]">Tugas Jemputan</h3>
                                        <p className="text-[9px] text-blue-600 mt-0.5 leading-tight">Daftar toko yang minta dipickup. Siapa cepat dia dapat!</p>
                                    </div>
                                </div>
                                {jemputans.length === 0 ? (
                                    <div className="text-center py-8 text-gray-400 text-[10px]">Belum ada request jemputan.</div>
                                ) : (
                                    <div className="space-y-2">
                                        {jemputans.map((jpt, i) => {
                                            const isMenunggu = String(jpt.status).toLowerCase() === 'menunggu' || !jpt.status;
                                            const isMilikSaya = String(jpt.kurirId).toLowerCase() === kurirId.toLowerCase();
                                            return (
                                                <div key={i} className={`bg-white border ${isMilikSaya ? 'border-orange-200' : 'border-gray-200'} rounded-xl p-2.5 shadow-sm`}>
                                                    <div className="flex justify-between items-start mb-1.5">
                                                        <h3 className="font-black text-gray-800 text-[11px]">{jpt.olshopName}</h3>
                                                        <span className={`text-[7px] font-bold px-1.5 py-0.5 rounded ${isMenunggu ? 'bg-red-100 text-red-600' : 'bg-orange-100 text-orange-600'}`}>{isMenunggu ? 'TERSEDIA' : 'DIAMBIL'}</span>
                                                    </div>
                                                    <p className="text-[9px] text-gray-500 mb-2 truncate"><i className="fas fa-map-marker-alt w-3"></i> {jpt.address}</p>
                                                    {isMenunggu ? (
                                                        <button onClick={() => handleAmbilJemputan(jpt.idJemput)} className="w-full bg-slate-800 text-white font-bold text-[9px] py-2 rounded-lg active:scale-95">Ambil Tugas</button>
                                                    ) : isMilikSaya ? (
                                                        <button onClick={() => handleSelesaiJemputan(jpt.idJemput)} className="w-full bg-orange-100 text-orange-700 font-bold text-[9px] py-2 rounded-lg border border-orange-200 active:scale-95">Selesaikan Pickup</button>
                                                    ) : (
                                                        <div className="w-full bg-gray-100 text-gray-400 font-bold text-[9px] py-2 rounded-lg text-center">Diambil Kurir Lain</div>
                                                    )}
                                                </div>
                                            )
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* TAB: INPUT BARU */}
                        {activeTab === 'input' && (
                            <div className="animate-slide-up bg-white p-3 rounded-2xl border border-gray-100 shadow-sm relative z-0">
                                <h2 className="font-black text-gray-800 mb-3 text-[12px] flex items-center"><div className="w-6 h-6 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center mr-2"><i className="fas fa-plus text-[10px]"></i></div>Input Resi Baru</h2>
                                <form onSubmit={handleInputBaru} className="space-y-3 relative">
                                    
                                    <div className="relative z-50">
                                        <label className="text-[9px] font-bold text-gray-500 uppercase block mb-1">Nama Toko (Olshop)*</label>
                                        <input 
                                            type="text" required autoComplete="off" value={inputOlshopSearch}
                                            onChange={(e) => { setInputOlshopSearch(e.target.value); setShowOlshopDropdown(true); }}
                                            onFocus={() => setShowOlshopDropdown(true)}
                                            className="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 text-[11px] font-semibold outline-none focus:border-orange-500 relative z-50"
                                            placeholder="Ketik/Pilih Olshop..."
                                        />
                                        {showOlshopDropdown && (
                                            <React.Fragment>
                                                <div className="fixed inset-0 z-40" onClick={() => setShowOlshopDropdown(false)}></div>
                                                <ul className="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-lg shadow-xl max-h-40 overflow-y-auto">
                                                    {masterOlshops.filter(o => o.nama.toLowerCase().includes(inputOlshopSearch.toLowerCase())).map((o, i) => (
                                                        <li key={i} onClick={() => { setInputOlshopSearch(o.nama); setShowOlshopDropdown(false); }} className="p-2.5 text-[10px] hover:bg-orange-50 cursor-pointer border-b border-gray-100 font-bold text-gray-700">{o.nama}</li>
                                                    ))}
                                                    {masterOlshops.filter(o => o.nama.toLowerCase().includes(inputOlshopSearch.toLowerCase())).length === 0 && (
                                                        <li className="p-2.5 text-[10px] text-gray-400 italic">Toko tidak ditemukan</li>
                                                    )}
                                                </ul>
                                            </React.Fragment>
                                        )}
                                    </div>

                                    <div><label className="text-[9px] font-bold text-gray-500 uppercase block mb-1">Nama Penerima*</label><input type="text" name="customerName" required className="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 text-[11px] font-semibold focus:border-orange-500 outline-none" /></div>
                                    <div><label className="text-[9px] font-bold text-gray-500 uppercase block mb-1">No HP</label><input type="tel" name="customerPhone" className="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 text-[11px] font-semibold focus:border-orange-500 outline-none" /></div>
                                    <div><label className="text-[9px] font-bold text-gray-500 uppercase block mb-1">Alamat Lengkap*</label><textarea name="address" required rows="2" className="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 text-[11px] font-semibold focus:border-orange-500 outline-none"></textarea></div>
                                    
                                    <div className="grid grid-cols-2 gap-2 relative z-0">
                                        <div>
                                            <label className="text-[9px] font-bold text-gray-500 uppercase block mb-1">Hrg Barang</label>
                                            <input 
                                                type="text" inputMode="numeric" name="hargaPaket" value={valHarga}
                                                onChange={(e) => { let v = e.target.value.replace(/\D/g, ''); setValHarga(v ? new Intl.NumberFormat('id-ID').format(v) : ''); }}
                                                className="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 text-[11px] font-semibold focus:border-orange-500 outline-none" 
                                            />
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-bold text-gray-500 uppercase block mb-1">Kode Zona (TRF)</label>
                                            <select name="ongkirKode" className="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 text-[11px] font-semibold truncate focus:border-orange-500 outline-none">
                                                <option value="" data-harga="0">Pilih Zona...</option>
                                                {masterZonas.map((z, i) => <option key={i} value={z.id} data-harga={z.harga}>{z.id} ({z.nama}) - Rp {formatCurr(z.harga)}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[9px] font-bold text-gray-500 uppercase block mb-1">Tmbhn Ongkir Vol/Jarak</label>
                                        <input 
                                            type="text" inputMode="numeric" name="tambahanOngkir" value={valTambahan}
                                            onChange={(e) => { let v = e.target.value.replace(/\D/g, ''); setValTambahan(v ? new Intl.NumberFormat('id-ID').format(v) : ''); }}
                                            className="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 text-[11px] font-semibold focus:border-orange-500 outline-none" 
                                        />
                                    </div>

                                    <div className="border-t border-gray-100 pt-3 mt-3">
                                        <label className="text-[10px] font-bold text-orange-600 uppercase block mb-1">Status Pengantaran</label>
                                        <select 
                                            value={inputFormStatus} 
                                            onChange={(e) => setInputFormStatus(e.target.value)} 
                                            className="w-full bg-white border border-orange-300 text-orange-800 rounded-lg p-2.5 text-[11px] font-bold focus:border-orange-500 outline-none"
                                        >
                                            <option value="SIAP_ANTAR">PROSES (Siap Antar)</option>
                                            <option value="SUKSES">SUKSES</option>
                                            <option value="PENDING">PENDING</option>
                                            <option value="CANCEL">CANCEL</option>
                                        </select>
                                    </div>

                                    {inputFormStatus === 'SUKSES' && (
                                        <div className="animate-slide-up bg-emerald-50 border border-emerald-200 p-2.5 rounded-lg">
                                            <label className="text-[9px] font-bold text-emerald-800 uppercase block mb-1">Metode Bayar (Wajib)</label>
                                            <select name="metodeBayar" required className="w-full bg-white border border-emerald-300 rounded-lg p-2.5 text-[11px] font-bold text-emerald-800 outline-none">
                                                <option value="CASH">CASH</option>
                                                <option value="TF OLSHOP">TF OLSHOP</option>
                                                <option value="TF KANTOR">TF KANTOR</option>
                                            </select>
                                        </div>
                                    )}

                                    {(inputFormStatus === 'PENDING' || inputFormStatus === 'CANCEL') && (
                                        <div className="animate-slide-up bg-red-50 border border-red-200 p-2.5 rounded-lg">
                                            <label className="text-[9px] font-bold text-red-800 uppercase block mb-1">Keterangan / Alasan</label>
                                            <input type="text" name="keteranganForm" required placeholder="Tulis alasan..." className="w-full bg-white border border-red-300 rounded-lg p-2.5 text-[11px] font-bold outline-none" />
                                        </div>
                                    )}

                                    {/* CAMERA */}
                                    <div className="pt-2 relative z-0">
                                        <label className="text-[9px] font-bold text-gray-500 uppercase block mb-1">Foto Gambar Paket</label>
                                        <div className="bg-gray-50 border border-dashed border-gray-300 rounded-lg overflow-hidden">
                                            {!capturedPhoto ? (
                                                <button type="button" onClick={startCamera} className="w-full py-6 text-gray-400 flex flex-col items-center hover:bg-gray-100 transition-colors">
                                                    <i className="fas fa-camera text-2xl mb-1 text-orange-500"></i>
                                                    <span className="text-[10px] font-bold text-gray-600">Buka Kamera HP</span>
                                                </button>
                                            ) : (
                                                <div className="relative">
                                                    <img src={capturedPhoto} className="w-full max-h-32 object-cover" />
                                                    <button type="button" onClick={retakePhoto} className="absolute top-2 right-2 bg-red-500 text-white px-2 py-1 rounded shadow-md text-[9px] font-bold flex items-center">
                                                        <i className="fas fa-redo mr-1"></i> Ulang
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <button type="submit" disabled={isLoading} className="w-full bg-slate-900 text-white font-bold py-3 rounded-lg active:scale-95 mt-4 text-[11px] relative z-0 uppercase tracking-widest shadow-md">Simpan Resi</button>
                                </form>
                            </div>
                        )}

                        {/* TAB: HISTORI */}
                        {activeTab === 'histori' && (
                            <div className="animate-slide-up">
                                <h2 className="font-black text-gray-800 text-[13px] mb-2 flex items-center"><i className="fas fa-history text-orange-500 mr-1.5"></i> Histori Tugas</h2>
                                <div className="bg-white p-2 rounded-xl shadow-sm border border-gray-100 mb-2 flex items-center gap-1.5">
                                    <div className="flex-1"><label className="text-[7px] font-bold text-gray-400 uppercase block mb-0.5">Dari Tgl</label><input type="date" value={historiStartDate} onChange={e=>setHistoriStartDate(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded p-1.5 text-[9px] outline-none focus:border-orange-500" /></div>
                                    <div className="flex-1"><label className="text-[7px] font-bold text-gray-400 uppercase block mb-0.5">Sampai Tgl</label><input type="date" value={historiEndDate} onChange={e=>setHistoriEndDate(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded p-1.5 text-[9px] outline-none focus:border-orange-500" /></div>
                                </div>
                                <div className="flex gap-1.5 mb-3 overflow-x-auto scrollbar-hide py-0.5">
                                    <button onClick={() => setHistoriStatusFilter('semua')} className={`px-2.5 py-1 rounded-md text-[9px] font-bold uppercase shrink-0 ${historiStatusFilter === 'semua' ? 'bg-slate-800 text-white' : 'bg-white text-gray-500 border border-gray-200'}`}>Semua</button>
                                    <button onClick={() => setHistoriStatusFilter('sukses')} className={`px-2.5 py-1 rounded-md text-[9px] font-bold uppercase shrink-0 ${historiStatusFilter === 'sukses' ? 'bg-emerald-500 text-white' : 'bg-white text-gray-500 border border-gray-200'}`}>Sukses</button>
                                    <button onClick={() => setHistoriStatusFilter('pending')} className={`px-2.5 py-1 rounded-md text-[9px] font-bold uppercase shrink-0 ${historiStatusFilter === 'pending' ? 'bg-yellow-500 text-white' : 'bg-white text-gray-500 border border-gray-200'}`}>Pending</button>
                                    <button onClick={() => setHistoriStatusFilter('cancel')} className={`px-2.5 py-1 rounded-md text-[9px] font-bold uppercase shrink-0 ${historiStatusFilter === 'cancel' ? 'bg-red-500 text-white' : 'bg-white text-gray-500 border border-gray-200'}`}>Cancel</button>
                                </div>
                                <div className="space-y-2">
                                    {historiPkgs.length === 0 ? (
                                        <div className="text-center py-6 bg-white rounded-xl border border-gray-100"><p className="text-[10px] text-gray-400 font-bold">Tidak ada riwayat.</p></div>
                                    ) : historiPkgs.map((pkg, i) => {
                                        const stat = String(pkg.status).toUpperCase();
                                        let bgBadge = 'bg-gray-100 text-gray-600';
                                        if (stat === 'SUKSES') bgBadge = 'bg-emerald-100 text-emerald-700 border border-emerald-200';
                                        if (stat === 'PENDING') bgBadge = 'bg-yellow-100 text-yellow-700 border border-yellow-200';
                                        if (stat === 'CANCEL' || stat === 'BATAL') bgBadge = 'bg-red-100 text-red-700 border border-red-200';
                                        const resolvedUrlFoto = getFotoUrl(pkg.fotoBukti);
                                        return (
                                            <div key={i} onClick={() => setDetailPkg(pkg)} className="bg-white border border-gray-100 rounded-xl py-2 pr-2.5 flex justify-between items-center shadow-sm relative overflow-hidden cursor-pointer active:scale-[0.98] transition-transform">
                                                <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${stat === 'SUKSES' ? 'bg-emerald-500' : (stat === 'PENDING' ? 'bg-yellow-500' : 'bg-red-500')}`}></div>
                                                {resolvedUrlFoto ? (
                                                    <img src={resolvedUrlFoto} className="w-10 h-10 rounded-md border border-gray-200 object-cover shrink-0 ml-3" onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }} />
                                                ) : null}
                                                <div className={`w-10 h-10 rounded-md bg-gray-50 border border-gray-200 items-center justify-center shrink-0 ml-3 ${resolvedUrlFoto ? 'hidden' : 'flex'}`}><i className="fas fa-image text-[10px] text-gray-300"></i></div>
                                                
                                                <div className="pl-2.5 flex-1 min-w-0">
                                                    <p className="font-bold text-gray-800 text-[11px] truncate">{pkg.customerName}</p>
                                                    <p className="text-[9px] text-gray-500 truncate mt-0.5">{pkg.packageId} • {pkg.olshopName}</p>
                                                </div>
                                                <div className="flex flex-col items-end shrink-0 pl-2">
                                                    <span className={`text-[8px] font-bold px-2 py-0.5 rounded uppercase ${bgBadge}`}>{stat === 'SIAP_ANTAR' || stat === 'PROSES' ? 'PROSES' : stat}</span>
                                                    <span className="text-[11px] font-black text-blue-600 mt-1">{formatCurr(pkg.totalTagihan)}</span>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )}

                        {/* TAB: SALDO */}
                        {activeTab === 'saldo' && (
                            <div className="animate-slide-up">
                                <h2 className="font-black text-gray-800 text-[13px] mb-2 flex items-center"><i className="fas fa-wallet text-orange-500 mr-1.5"></i> Saldo Setoran</h2>
                                <div className="bg-white p-2 rounded-xl shadow-sm border border-gray-100 mb-3 flex items-center gap-1.5">
                                    <div className="flex-1"><label className="text-[7px] font-bold text-gray-400 uppercase block mb-0.5">Dari Tgl</label><input type="date" value={saldoStartDate} onChange={e=>setSaldoStartDate(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded p-1.5 text-[9px] outline-none focus:border-orange-500" /></div>
                                    <div className="flex-1"><label className="text-[7px] font-bold text-gray-400 uppercase block mb-0.5">Sampai Tgl</label><input type="date" value={saldoEndDate} onChange={e=>setSaldoEndDate(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded p-1.5 text-[9px] outline-none focus:border-orange-500" /></div>
                                </div>
                                <div className="bg-slate-900 rounded-2xl p-5 text-white shadow-md relative overflow-hidden mb-3">
                                    <div className="absolute -right-2 -bottom-2 opacity-10"><i className="fas fa-money-bill-wave text-[70px] text-blue-400"></i></div>
                                    <p className="text-[9px] text-slate-400 font-bold uppercase mb-0.5">WAJIB SETOR (KANTOR)</p>
                                    <h2 className={`text-3xl font-black mb-3 ${setoran < 0 ? 'text-red-400' : 'text-emerald-400'}`}>{formatCurr(setoran)}</h2>
                                    <div className="flex justify-between items-end border-t border-slate-700 pt-2">
                                        <div><p className="text-[8px] text-slate-400 font-bold uppercase">Total Pkt Sukses</p><p className="text-[11px] font-bold text-white">{s_sukses} Pkt</p></div>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3 mb-3">
                                    <div className="bg-white border border-gray-100 p-3 rounded-xl text-center shadow-sm"><p className="text-[8px] text-gray-400 font-bold uppercase mb-1"><i className="fas fa-hand-holding-usd text-emerald-500 mr-1"></i> Uang Cash</p><p className="font-black text-emerald-600 text-[12px]">{formatCurr(rincianCash)}</p></div>
                                    <div className="bg-white border border-gray-100 p-3 rounded-xl text-center shadow-sm"><p className="text-[8px] text-gray-400 font-bold uppercase mb-1"><i className="fas fa-wallet text-orange-500 mr-1"></i> Simpan (Cash)</p><p className="font-black text-orange-500 text-[12px]">{formatCurr(tambahanOngkirCash)}</p></div>
                                </div>
                                <div className="bg-white border border-gray-100 p-3 rounded-xl text-center shadow-sm"><p className="text-[8px] text-gray-400 font-bold uppercase mb-1"><i className="fas fa-cut text-purple-500 mr-1"></i> Potong TF (Hak Kurir/Olshop)</p><p className="font-black text-purple-500 text-[12px]">{formatCurr(tambahanOngkirTF)}</p></div>
                            </div>
                        )}

                    </main>

                    {/* BOTTOM NAV */}
                    <nav className="absolute bottom-0 w-full glass-nav flex justify-between items-end h-[60px] z-40 border-t border-slate-800 pb-2 px-1">
                        <button onClick={() => setActiveTab('tugas')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'tugas' ? 'text-orange-500' : 'text-slate-500'}`}><i className="fas fa-motorcycle text-lg mb-1"></i><span className="text-[8px] font-bold">Antar</span></button>
                        <button onClick={() => setActiveTab('jemput')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'jemput' ? 'text-orange-500' : 'text-slate-500'}`}><i className="fas fa-truck-pickup text-lg mb-1"></i><span className="text-[8px] font-bold">Jemput</span></button>
                        <button onClick={() => setActiveTab('rute')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'rute' ? 'text-orange-500' : 'text-slate-500'}`}><i className="fas fa-route text-lg mb-1"></i><span className="text-[8px] font-bold">Rute</span></button>
                        <div className="relative -top-5 flex-shrink-0 px-1.5"><button onClick={() => setActiveTab('input')} className="w-12 h-12 bg-orange-600 text-white rounded-full shadow-lg flex items-center justify-center text-lg border-4 border-slate-900 active:scale-95 transition-transform"><i className="fas fa-plus"></i></button></div>
                        <button onClick={() => setActiveTab('histori')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'histori' ? 'text-orange-500' : 'text-slate-500'}`}><i className="fas fa-history text-lg mb-1"></i><span className="text-[8px] font-bold">Histori</span></button>
                        <button onClick={() => setActiveTab('saldo')} className={`flex flex-col items-center flex-1 transition-colors ${activeTab === 'saldo' ? 'text-orange-500' : 'text-slate-500'}`}><i className="fas fa-wallet text-lg mb-1"></i><span className="text-[8px] font-bold">Saldo</span></button>
                    </nav>

                    {/* MODAL Laporan Screenshot (Muncul jika klik Kartu Paket) */}
                    {detailPkg && !isModalOpen && (
                        <div className="fixed inset-0 z-50 bg-slate-900/90 flex flex-col justify-center items-center p-5 animate-fade-in" onClick={() => setDetailPkg(null)}>
                            <div className="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl relative" onClick={(e) => e.stopPropagation()}>
                                <button onClick={() => setDetailPkg(null)} className="absolute top-3 right-3 w-8 h-8 bg-gray-100 hover:bg-gray-200 rounded-full flex items-center justify-center text-gray-600 z-10"><i className="fas fa-times"></i></button>
                                
                                <div id="screenshot-area" className="bg-white p-5">
                                    <div className="text-center mb-4 border-b border-gray-100 pb-4">
                                        <h2 className="font-black text-slate-800 text-lg uppercase tracking-widest text-center">{detailPkg.olshopName}</h2>
                                        <p className="text-[10px] text-gray-500">EXCEED EXPRESS LOGISTICS</p>
                                    </div>

                                    {getFotoUrl(detailPkg.fotoBukti) ? (
                                        <img src={getFotoUrl(detailPkg.fotoBukti)} className="w-full h-48 object-cover rounded-xl mb-4 border border-gray-200" onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }} />
                                    ) : null}
                                    <div className={`w-full h-48 rounded-xl bg-gray-50 border border-dashed border-gray-300 items-center justify-center mb-4 ${getFotoUrl(detailPkg.fotoBukti) ? 'hidden' : 'flex'}`}>
                                        <div className="text-center text-gray-400">
                                            <i className="fas fa-image text-3xl mb-2"></i>
                                            <p className="text-[10px] font-bold uppercase">Foto Paket Belum Ada</p>
                                        </div>
                                    </div>

                                    <div className="space-y-3 bg-gray-50 p-3 rounded-xl border border-gray-100">
                                        <div>
                                            <p className="text-[9px] font-bold text-gray-500 uppercase tracking-widest mb-0.5">Penerima</p>
                                            <p className="font-bold text-gray-800 text-sm">{detailPkg.customerName}</p>
                                            <p className="text-[11px] text-gray-600 font-semibold">{detailPkg.customerPhone}</p>
                                        </div>
                                        <div>
                                            <p className="text-[9px] font-bold text-gray-500 uppercase tracking-widest mb-0.5">Alamat</p>
                                            <p className="text-[11px] text-gray-700 leading-snug">{detailPkg.address}</p>
                                        </div>
                                    </div>

                                    <div className="mt-4 flex justify-between items-center border-t border-gray-100 pt-4">
                                        <div>
                                            <p className="text-[9px] font-bold text-gray-500 uppercase tracking-widest mb-0.5">Kurir</p>
                                            <p className="font-bold text-orange-600 text-xs uppercase">{detailPkg.kurirId || kurirName}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[9px] font-bold text-gray-500 uppercase tracking-widest mb-0.5">Total COD / Tagihan</p>
                                            <p className="font-black text-blue-600 text-lg">{formatCurr(detailPkg.totalTagihan)}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL UPDATE STATUS */}
                    {isModalOpen && selectedPkg && (
                        <div className="absolute inset-0 z-[60] bg-black/60 flex flex-col justify-end animate-fade-in h-full">
                            <div className="flex-1" onClick={() => setIsModalOpen(false)}></div>
                            <div className="bg-white rounded-t-2xl shadow-2xl flex flex-col max-h-[90vh]">
                                <div className="p-4 border-b border-gray-100 bg-white flex justify-between items-center shrink-0 rounded-t-2xl">
                                    <h3 className="font-black text-slate-800 text-[14px] flex items-center"><i className="fas fa-edit text-orange-500 mr-2"></i> Update Pengiriman</h3>
                                    <button onClick={() => setIsModalOpen(false)} className="w-7 h-7 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-full flex items-center justify-center transition-colors"><i className="fas fa-times text-xs"></i></button>
                                </div>
